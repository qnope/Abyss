name: Deploy to GitHub Pages

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter create . --platforms=web
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Set deploy config
        id: config
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "href=/Abyss/" >> "$GITHUB_OUTPUT"
            echo "dest=." >> "$GITHUB_OUTPUT"
          else
            echo "href=/Abyss/test/" >> "$GITHUB_OUTPUT"
            echo "dest=test" >> "$GITHUB_OUTPUT"
          fi
      - run: flutter build web --release --base-href ${{ steps.config.outputs.href }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          destination_dir: ${{ steps.config.outputs.dest }}
          keep_files: true
