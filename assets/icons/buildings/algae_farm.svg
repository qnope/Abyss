<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="algaeFarmGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#69F0AE"/>
    </linearGradient>
    <filter id="algaeFarmGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#algaeFarmGlow)">
    <!-- Metallic base platform -->
    <rect x="10" y="48" width="44" height="6" rx="2" fill="#1B5E20" stroke="#2E7D32" stroke-width="1"/>
    <!-- Base frame vertical supports -->
    <rect x="12" y="24" width="3" height="24" rx="1" fill="#1B5E20"/>
    <rect x="49" y="24" width="3" height="24" rx="1" fill="#1B5E20"/>
    <!-- Glass dome -->
    <path d="M12 48 L12 28 Q12 12, 32 10 Q52 12, 52 28 L52 48 Z" fill="#69F0AE" fill-opacity="0.15" stroke="#69F0AE" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Dome horizontal frame bars -->
    <line x1="12" y1="36" x2="52" y2="36" stroke="#2E7D32" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="14" y1="24" x2="50" y2="24" stroke="#2E7D32" stroke-width="1" stroke-opacity="0.7"/>
    <!-- Dome center vertical frame bar -->
    <line x1="32" y1="10" x2="32" y2="48" stroke="#2E7D32" stroke-width="1" stroke-opacity="0.5"/>
    <!-- Algae stem 1 (left) -->
    <path d="M24 48 C23 42, 26 38, 22 30" stroke="#2E7D32" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M24 40 C20 37, 16 35, 15 32 C17 34, 20 36, 24 38 Z" fill="url(#algaeFarmGrad)"/>
    <path d="M23 34 C26 31, 28 28, 29 25 C27 28, 25 31, 23 32 Z" fill="url(#algaeFarmGrad)"/>
    <!-- Algae stem 2 (center) -->
    <path d="M32 48 C31 40, 34 34, 32 24" stroke="#2E7D32" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M32 38 C28 35, 24 32, 22 28 C25 31, 28 34, 32 36 Z" fill="url(#algaeFarmGrad)"/>
    <path d="M32 30 C36 27, 39 23, 40 20 C38 23, 35 27, 32 28 Z" fill="url(#algaeFarmGrad)"/>
    <!-- Algae stem 3 (right) -->
    <path d="M40 48 C41 43, 38 38, 42 30" stroke="#2E7D32" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M40 40 C44 37, 47 34, 48 31 C46 33, 43 36, 40 38 Z" fill="url(#algaeFarmGrad)"/>
    <path d="M41 34 C38 31, 36 28, 35 25 C37 28, 39 31, 41 32 Z" fill="url(#algaeFarmGrad)"/>
    <!-- Grow lights -->
    <circle cx="22" cy="16" r="2" fill="#69F0AE" fill-opacity="0.8"/>
    <circle cx="32" cy="13" r="2" fill="#69F0AE" fill-opacity="0.8"/>
    <circle cx="42" cy="16" r="2" fill="#69F0AE" fill-opacity="0.8"/>
    <!-- Light rays -->
    <line x1="22" y1="18" x2="22" y2="22" stroke="#69F0AE" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="32" y1="15" x2="32" y2="20" stroke="#69F0AE" stroke-width="0.8" stroke-opacity="0.5"/>
    <line x1="42" y1="18" x2="42" y2="22" stroke="#69F0AE" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- Output pipes on right side -->
    <rect x="52" y="38" width="8" height="3" rx="1.5" fill="#1B5E20" stroke="#2E7D32" stroke-width="0.8"/>
    <rect x="52" y="43" width="6" height="3" rx="1.5" fill="#1B5E20" stroke="#2E7D32" stroke-width="0.8"/>
    <!-- Pipe connectors -->
    <circle cx="60" cy="39.5" r="1.5" fill="#2E7D32"/>
    <circle cx="58" cy="44.5" r="1.5" fill="#2E7D32"/>
  </g>
</svg>
