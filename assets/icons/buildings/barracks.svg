<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="barracksGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <linearGradient id="barracksBaseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9E9E9E"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
    <filter id="barracksGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#barracksGlow)">
    <!-- Base platform -->
    <polygon points="8,48 56,48 54,52 10,52" fill="url(#barracksBaseGrad)" stroke="#424242" stroke-width="0.5"/>
    <polygon points="10,52 54,52 52,55 12,55" fill="#546E7A" stroke="#37474F" stroke-width="0.4"/>
    <!-- Main bunker body -->
    <rect x="12" y="30" width="40" height="18" rx="1" fill="url(#barracksGrad)" stroke="#BF360C" stroke-width="0.8"/>
    <!-- Bunker highlight -->
    <rect x="13" y="31" width="18" height="16" rx="1" fill="#FFB74D" opacity="0.12"/>
    <!-- Crenellations (merlons along top edge) -->
    <rect x="14" y="26" width="6" height="5" rx="0.5" fill="url(#barracksGrad)" stroke="#BF360C" stroke-width="0.5"/>
    <rect x="23" y="26" width="6" height="5" rx="0.5" fill="url(#barracksGrad)" stroke="#BF360C" stroke-width="0.5"/>
    <rect x="35" y="26" width="6" height="5" rx="0.5" fill="url(#barracksGrad)" stroke="#BF360C" stroke-width="0.5"/>
    <rect x="44" y="26" width="6" height="5" rx="0.5" fill="url(#barracksGrad)" stroke="#BF360C" stroke-width="0.5"/>
    <!-- Portholes (left) -->
    <circle cx="22" cy="39" r="2.2" fill="#3E1400" stroke="#FFCC80" stroke-width="0.6"/>
    <circle cx="22" cy="39" r="1.2" fill="#FFB74D" opacity="0.7"/>
    <!-- Portholes (center) -->
    <circle cx="32" cy="39" r="2.2" fill="#3E1400" stroke="#FFCC80" stroke-width="0.6"/>
    <circle cx="32" cy="39" r="1.2" fill="#FFB74D" opacity="0.7"/>
    <!-- Portholes (right) -->
    <circle cx="42" cy="39" r="2.2" fill="#3E1400" stroke="#FFCC80" stroke-width="0.6"/>
    <circle cx="42" cy="39" r="1.2" fill="#FFB74D" opacity="0.7"/>
    <!-- Armored door (center) -->
    <rect x="28" y="42" width="8" height="6" rx="0.5" fill="#BF360C" stroke="#3E1400" stroke-width="0.5"/>
    <rect x="29" y="43" width="6" height="4" rx="0.5" fill="#E65100" stroke="#BF360C" stroke-width="0.3"/>
    <!-- Door handle -->
    <circle cx="33.5" cy="45" r="0.6" fill="#FFCC80"/>
    <!-- Reinforcement rivets (top row) -->
    <circle cx="15" cy="33" r="0.6" fill="#FFCC80" opacity="0.5"/>
    <circle cx="20" cy="33" r="0.6" fill="#FFCC80" opacity="0.5"/>
    <circle cx="44" cy="33" r="0.6" fill="#FFCC80" opacity="0.5"/>
    <circle cx="49" cy="33" r="0.6" fill="#FFCC80" opacity="0.5"/>
    <!-- Reinforcement rivets (bottom row) -->
    <circle cx="15" cy="45" r="0.6" fill="#FFCC80" opacity="0.5"/>
    <circle cx="20" cy="45" r="0.6" fill="#FFCC80" opacity="0.5"/>
    <circle cx="44" cy="45" r="0.6" fill="#FFCC80" opacity="0.5"/>
    <circle cx="49" cy="45" r="0.6" fill="#FFCC80" opacity="0.5"/>
    <!-- Periscope on top -->
    <rect x="31" y="18" width="2" height="8" rx="0.5" fill="#757575" stroke="#424242" stroke-width="0.4"/>
    <rect x="29" y="16" width="6" height="3" rx="0.8" fill="#9E9E9E" stroke="#424242" stroke-width="0.4"/>
    <!-- Periscope lens -->
    <circle cx="34" cy="17.5" r="1" fill="#3E1400" stroke="#FFCC80" stroke-width="0.4"/>
    <circle cx="34" cy="17.5" r="0.5" fill="#FFB74D" opacity="0.8"/>
    <!-- Crossed weapons emblem (center bunker wall) -->
    <line x1="29" y1="36" x2="35" y2="34" stroke="#FFCC80" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
    <line x1="35" y1="36" x2="29" y2="34" stroke="#FFCC80" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
