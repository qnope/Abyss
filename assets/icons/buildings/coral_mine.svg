<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cmGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C2185B"/>
      <stop offset="100%" stop-color="#FF6E91"/>
    </linearGradient>
    <linearGradient id="cmStruct" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#132238"/>
      <stop offset="100%" stop-color="#1B3150"/>
    </linearGradient>
    <filter id="cmGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#cmGlow)">
    <!-- Mining structure base -->
    <rect x="18" y="40" width="28" height="12" rx="3" fill="url(#cmStruct)"/>
    <!-- Drill arm -->
    <path d="M32 40 L32 20 L30 18 L32 10 L34 18 L32 20" stroke="#4A5568" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="10" r="2" fill="#FF6E91" opacity="0.8"/>
    <!-- Coral formations being mined -->
    <path d="M14 52 C14 44, 16 38, 18 34 C19 36, 17 42, 18 48" fill="url(#cmGrad)" opacity="0.7"/>
    <path d="M10 54 C12 48, 14 44, 13 38 C15 42, 14 48, 12 54" fill="#C2185B" opacity="0.6"/>
    <path d="M48 52 C48 44, 46 40, 44 36 C43 40, 45 44, 44 48" fill="url(#cmGrad)" opacity="0.7"/>
    <path d="M52 54 C50 48, 48 44, 49 38 C47 42, 48 48, 50 54" fill="#C2185B" opacity="0.6"/>
    <!-- Machine lights -->
    <rect x="22" y="43" width="3" height="2" rx="0.5" fill="#FF6E91" opacity="0.7"/>
    <rect x="39" y="43" width="3" height="2" rx="0.5" fill="#FF6E91" opacity="0.7"/>
    <!-- Extraction particles -->
    <circle cx="26" cy="32" r="1.2" fill="#FF6E91" opacity="0.4"/>
    <circle cx="38" cy="28" r="1" fill="#FF6E91" opacity="0.3"/>
    <circle cx="30" cy="24" r="0.8" fill="#FF80AB" opacity="0.5"/>
  </g>
</svg>
