<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="coralMineGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C2185B"/>
      <stop offset="100%" stop-color="#FF6E91"/>
    </linearGradient>
    <filter id="coralMineGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#coralMineGlow)">
    <!-- Platform/base anchored to seabed -->
    <rect x="12" y="54" width="40" height="4" rx="1" fill="#5D4037"/>
    <rect x="16" y="52" width="32" height="3" rx="1" fill="#6D4C41"/>
    <!-- Support legs -->
    <line x1="18" y1="52" x2="16" y2="54" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
    <line x1="46" y1="52" x2="48" y2="54" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
    <!-- Central mechanical tower/derrick -->
    <rect x="28" y="26" width="8" height="26" rx="1" fill="#78909C" opacity="0.9"/>
    <rect x="30" y="22" width="4" height="6" rx="1" fill="#90A4AE"/>
    <!-- Derrick cross-bracing -->
    <line x1="29" y1="30" x2="35" y2="38" stroke="#546E7A" stroke-width="1" stroke-linecap="round"/>
    <line x1="35" y1="30" x2="29" y2="38" stroke="#546E7A" stroke-width="1" stroke-linecap="round"/>
    <line x1="29" y1="38" x2="35" y2="46" stroke="#546E7A" stroke-width="1" stroke-linecap="round"/>
    <line x1="35" y1="38" x2="29" y2="46" stroke="#546E7A" stroke-width="1" stroke-linecap="round"/>
    <!-- Drill bit descending from tower -->
    <line x1="32" y1="52" x2="32" y2="58" stroke="#B0BEC5" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M30 57 L32 62 L34 57" fill="#CFD8DC" stroke="#90A4AE" stroke-width="0.8"/>
    <!-- Gear on tower (large) -->
    <circle cx="32" cy="30" r="4" fill="none" stroke="#B0BEC5" stroke-width="1.5"/>
    <circle cx="32" cy="30" r="1.5" fill="#B0BEC5"/>
    <!-- Gear teeth -->
    <line x1="32" y1="25.5" x2="32" y2="27" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round"/>
    <line x1="32" y1="33" x2="32" y2="34.5" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round"/>
    <line x1="27.5" y1="30" x2="29" y2="30" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round"/>
    <line x1="35" y1="30" x2="36.5" y2="30" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round"/>
    <!-- Mechanical arm (articulated, reaching right) -->
    <line x1="36" y1="34" x2="44" y2="30" stroke="#78909C" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="30" x2="50" y2="38" stroke="#78909C" stroke-width="2" stroke-linecap="round"/>
    <!-- Arm joints (bolts) -->
    <circle cx="36" cy="34" r="1.5" fill="#546E7A" stroke="#B0BEC5" stroke-width="0.8"/>
    <circle cx="44" cy="30" r="1.5" fill="#546E7A" stroke="#B0BEC5" stroke-width="0.8"/>
    <!-- Claw/grabber at arm end -->
    <path d="M48 37 L50 38 L52 36" stroke="#90A4AE" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M48 39 L50 38 L52 40" stroke="#90A4AE" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Small gear on arm joint -->
    <circle cx="44" cy="30" r="3" fill="none" stroke="#90A4AE" stroke-width="0.8"/>
    <!-- Coral fragment being extracted (near claw, right side) -->
    <path d="M52 36 C53 33 55 30 56 27" stroke="url(#coralMineGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M54 31 C56 29 58 26 59 24" stroke="url(#coralMineGrad)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M52 36 C54 35 56 33 57 31" stroke="url(#coralMineGrad)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Coral growing from seabed (left side, organic contrast) -->
    <path d="M10 58 C10 58 10 48 11 42" stroke="url(#coralMineGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M11 48 C9 45 7 42 6 38" stroke="url(#coralMineGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M11 44 C13 41 15 38 16 35" stroke="url(#coralMineGrad)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M7 42 C5 40 4 36 3 33" stroke="url(#coralMineGrad)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Small coral fragments on platform (being collected) -->
    <path d="M20 52 C19 50 18 48 17 46" stroke="url(#coralMineGrad)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M22 52 C23 50 24 48 25 47" stroke="url(#coralMineGrad)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Bolts on platform -->
    <circle cx="20" cy="53" r="0.8" fill="#4E342E"/>
    <circle cx="44" cy="53" r="0.8" fill="#4E342E"/>
    <circle cx="32" cy="53" r="0.8" fill="#4E342E"/>
    <!-- Exhaust/steam from top of tower -->
    <path d="M30 22 C28 18 26 16 24 14" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M34 22 C36 19 37 16 38 13" stroke="#B0BEC5" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>
  </g>
</svg>
