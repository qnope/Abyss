<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Metallic frame gradient (dark to biolumBlue) -->
    <linearGradient id="dmFrameGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#448AFF"/>
    </linearGradient>
    <!-- Rift energy core gradient (blue to green bioluminescent) -->
    <linearGradient id="dmRiftGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#448AFF"/>
      <stop offset="100%" stop-color="#69F0AE"/>
    </linearGradient>
    <!-- Platform base gradient (dark to deep blue) -->
    <linearGradient id="dmBaseGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <!-- Inner rift undulation gradient (green to blue) -->
    <linearGradient id="dmEnergyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#448AFF"/>
    </linearGradient>
    <!-- Outer glow aura (radial) -->
    <radialGradient id="dmGlowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#448AFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#448AFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter -->
    <filter id="dmGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#dmGlow)">

    <!-- === Outer glow aura behind portal === -->
    <ellipse cx="32" cy="30" rx="22" ry="20" fill="url(#dmGlowGrad)" opacity="0.4"/>

    <!-- === Base platform === -->
    <rect x="8" y="48" width="48" height="6" rx="2" fill="url(#dmBaseGrad)" stroke="#1A237E" stroke-width="1"/>
    <!-- Base conduit line left -->
    <line x1="12" y1="50" x2="22" y2="50" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.4"/>
    <!-- Base conduit line right (mirrored) -->
    <line x1="42" y1="50" x2="52" y2="50" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.4"/>
    <!-- Base indicator light left -->
    <circle cx="17" cy="52" r="0.8" fill="#69F0AE" opacity="0.7"/>
    <!-- Base indicator light right (mirrored) -->
    <circle cx="47" cy="52" r="0.8" fill="#69F0AE" opacity="0.7"/>
    <!-- Base center conduit -->
    <line x1="28" y1="51" x2="36" y2="51" stroke="#448AFF" stroke-width="0.6" stroke-opacity="0.5"/>
    <!-- Base center indicator -->
    <circle cx="32" cy="52" r="1" fill="#448AFF" opacity="0.6"/>

    <!-- === Structural support braces (diagonal from pillars to base) === -->
    <!-- Left brace -->
    <line x1="14" y1="44" x2="10" y2="48" stroke="url(#dmFrameGrad)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Right brace (mirrored) -->
    <line x1="50" y1="44" x2="54" y2="48" stroke="url(#dmFrameGrad)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Inner left brace -->
    <line x1="14" y1="42" x2="20" y2="48" stroke="#1A237E" stroke-width="0.8" stroke-opacity="0.6"/>
    <!-- Inner right brace (mirrored) -->
    <line x1="50" y1="42" x2="44" y2="48" stroke="#1A237E" stroke-width="0.8" stroke-opacity="0.6"/>

    <!-- === Vertical support pillars === -->
    <!-- Left pillar -->
    <rect x="11" y="14" width="6" height="34" rx="1" fill="url(#dmFrameGrad)" stroke="#448AFF" stroke-width="0.8" stroke-opacity="0.7"/>
    <!-- Right pillar (mirrored) -->
    <rect x="47" y="14" width="6" height="34" rx="1" fill="url(#dmFrameGrad)" stroke="#448AFF" stroke-width="0.8" stroke-opacity="0.7"/>
    <!-- Left pillar detail lines -->
    <line x1="12" y1="18" x2="16" y2="18" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="12" y1="24" x2="16" y2="24" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="12" y1="30" x2="16" y2="30" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="12" y1="36" x2="16" y2="36" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="12" y1="42" x2="16" y2="42" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- Right pillar detail lines (mirrored) -->
    <line x1="48" y1="18" x2="52" y2="18" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="48" y1="24" x2="52" y2="24" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="48" y1="30" x2="52" y2="30" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="48" y1="36" x2="52" y2="36" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="48" y1="42" x2="52" y2="42" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- Left pillar bolts -->
    <circle cx="12.5" cy="16" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>
    <circle cx="15.5" cy="16" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>
    <circle cx="12.5" cy="46" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>
    <circle cx="15.5" cy="46" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>
    <!-- Right pillar bolts (mirrored) -->
    <circle cx="48.5" cy="16" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>
    <circle cx="51.5" cy="16" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>
    <circle cx="48.5" cy="46" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>
    <circle cx="51.5" cy="46" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>
    <!-- Left pillar indicator lights -->
    <circle cx="14" cy="21" r="0.7" fill="#69F0AE" opacity="0.8"/>
    <circle cx="14" cy="33" r="0.7" fill="#448AFF" opacity="0.8"/>
    <circle cx="14" cy="39" r="0.7" fill="#69F0AE" opacity="0.6"/>
    <!-- Right pillar indicator lights (mirrored) -->
    <circle cx="50" cy="21" r="0.7" fill="#69F0AE" opacity="0.8"/>
    <circle cx="50" cy="33" r="0.7" fill="#448AFF" opacity="0.8"/>
    <circle cx="50" cy="39" r="0.7" fill="#69F0AE" opacity="0.6"/>

    <!-- === Gateway arch connecting pillars === -->
    <path d="M14 14 Q14 8, 32 8 Q50 8, 50 14" fill="none" stroke="url(#dmFrameGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Inner arch line -->
    <path d="M16 16 Q16 10, 32 10 Q48 10, 48 16" fill="none" stroke="#448AFF" stroke-width="1" stroke-opacity="0.5"/>
    <!-- Arch keystone -->
    <circle cx="32" cy="8" r="2" fill="#1A237E" stroke="#448AFF" stroke-width="0.8"/>
    <circle cx="32" cy="8" r="0.8" fill="#69F0AE" opacity="0.9"/>
    <!-- Arch corner bolts -->
    <circle cx="16" cy="13" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>
    <circle cx="48" cy="13" r="1" fill="#0D1B3E" stroke="#448AFF" stroke-width="0.4"/>

    <!-- === Rift / portal energy interior === -->
    <!-- Rift background fill -->
    <path d="M17 16 Q17 11, 32 11 Q47 11, 47 16 L47 48 L17 48 Z" fill="url(#dmRiftGrad)" fill-opacity="0.15"/>

    <!-- Undulating energy wave 1 (outermost) -->
    <path d="M20 16 Q24 22, 20 28 Q16 34, 20 40 Q24 46, 20 48" fill="none" stroke="url(#dmEnergyGrad)" stroke-width="1.2" stroke-opacity="0.4"/>
    <!-- Mirrored wave 1 -->
    <path d="M44 16 Q40 22, 44 28 Q48 34, 44 40 Q40 46, 44 48" fill="none" stroke="url(#dmEnergyGrad)" stroke-width="1.2" stroke-opacity="0.4"/>

    <!-- Undulating energy wave 2 -->
    <path d="M24 14 Q28 20, 24 26 Q20 32, 24 38 Q28 44, 24 48" fill="none" stroke="url(#dmRiftGrad)" stroke-width="1" stroke-opacity="0.5"/>
    <!-- Mirrored wave 2 -->
    <path d="M40 14 Q36 20, 40 26 Q44 32, 40 38 Q36 44, 40 48" fill="none" stroke="url(#dmRiftGrad)" stroke-width="1" stroke-opacity="0.5"/>

    <!-- Undulating energy wave 3 (inner) -->
    <path d="M28 12 Q31 18, 28 24 Q25 30, 28 36 Q31 42, 28 48" fill="none" stroke="#69F0AE" stroke-width="0.8" stroke-opacity="0.6"/>
    <!-- Mirrored wave 3 -->
    <path d="M36 12 Q33 18, 36 24 Q39 30, 36 36 Q33 42, 36 48" fill="none" stroke="#69F0AE" stroke-width="0.8" stroke-opacity="0.6"/>

    <!-- Glowing fissure line 1 (center) -->
    <path d="M32 12 Q33 18, 31 24 Q33 30, 31 36 Q33 42, 32 48" fill="none" stroke="#69F0AE" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- Glowing fissure line 2 (left of center) -->
    <path d="M30 14 Q31 20, 29 26 Q31 32, 29 38 Q31 44, 30 48" fill="none" stroke="#448AFF" stroke-width="0.7" stroke-opacity="0.5"/>
    <!-- Glowing fissure line 3 (right of center, mirrored) -->
    <path d="M34 14 Q33 20, 35 26 Q33 32, 35 38 Q33 44, 34 48" fill="none" stroke="#448AFF" stroke-width="0.7" stroke-opacity="0.5"/>

    <!-- Central bright core ellipse -->
    <ellipse cx="32" cy="30" rx="5" ry="8" fill="#69F0AE" fill-opacity="0.15" stroke="#69F0AE" stroke-width="0.6" stroke-opacity="0.5"/>
    <ellipse cx="32" cy="30" rx="3" ry="5" fill="#69F0AE" fill-opacity="0.25"/>
    <ellipse cx="32" cy="30" rx="1.5" ry="2.5" fill="#FFFFFF" fill-opacity="0.3"/>

    <!-- Energy wisps radiating outward -->
    <!-- Wisp top-left -->
    <path d="M28 20 Q24 18, 20 16" fill="none" stroke="#69F0AE" stroke-width="0.6" stroke-opacity="0.4"/>
    <!-- Wisp top-right (mirrored) -->
    <path d="M36 20 Q40 18, 44 16" fill="none" stroke="#69F0AE" stroke-width="0.6" stroke-opacity="0.4"/>
    <!-- Wisp mid-left -->
    <path d="M27 30 Q22 29, 18 30" fill="none" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.35"/>
    <!-- Wisp mid-right (mirrored) -->
    <path d="M37 30 Q42 29, 46 30" fill="none" stroke="#448AFF" stroke-width="0.5" stroke-opacity="0.35"/>
    <!-- Wisp bottom-left -->
    <path d="M28 40 Q24 42, 20 44" fill="none" stroke="#69F0AE" stroke-width="0.5" stroke-opacity="0.3"/>
    <!-- Wisp bottom-right (mirrored) -->
    <path d="M36 40 Q40 42, 44 44" fill="none" stroke="#69F0AE" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- === Particles / sparks === -->
    <!-- Blue particles -->
    <circle cx="22" cy="18" r="1" fill="#448AFF" opacity="0.6"/>
    <circle cx="42" cy="18" r="1" fill="#448AFF" opacity="0.6"/>
    <circle cx="19" cy="34" r="0.8" fill="#448AFF" opacity="0.4"/>
    <circle cx="45" cy="34" r="0.8" fill="#448AFF" opacity="0.4"/>
    <circle cx="25" cy="44" r="1.2" fill="#448AFF" opacity="0.3"/>
    <circle cx="39" cy="44" r="1.2" fill="#448AFF" opacity="0.3"/>
    <!-- Green particles -->
    <circle cx="26" cy="14" r="0.7" fill="#69F0AE" opacity="0.5"/>
    <circle cx="38" cy="14" r="0.7" fill="#69F0AE" opacity="0.5"/>
    <circle cx="21" cy="26" r="1.5" fill="#00E676" opacity="0.3"/>
    <circle cx="43" cy="26" r="1.5" fill="#00E676" opacity="0.3"/>
    <circle cx="24" cy="38" r="0.5" fill="#69F0AE" opacity="0.7"/>
    <circle cx="40" cy="38" r="0.5" fill="#69F0AE" opacity="0.7"/>
    <!-- Extra scattered particles -->
    <circle cx="8" cy="24" r="0.6" fill="#448AFF" opacity="0.3"/>
    <circle cx="56" cy="24" r="0.6" fill="#448AFF" opacity="0.3"/>
    <circle cx="6" cy="36" r="0.8" fill="#69F0AE" opacity="0.25"/>
    <circle cx="58" cy="36" r="0.8" fill="#69F0AE" opacity="0.25"/>

  </g>
</svg>
