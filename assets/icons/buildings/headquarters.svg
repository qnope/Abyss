<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="hqGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#B388FF"/>
    </linearGradient>
    <linearGradient id="hqBaseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9E9E9E"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
    <linearGradient id="hqAntennaGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#B388FF"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <filter id="hqGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#hqGlow)">
    <!-- Base platform -->
    <polygon points="8,48 56,48 54,52 10,52" fill="url(#hqBaseGrad)" stroke="#424242" stroke-width="0.5"/>
    <polygon points="10,52 54,52 52,55 12,55" fill="#546E7A" stroke="#37474F" stroke-width="0.4"/>
    <!-- Side structures (flanking towers) -->
    <rect x="11" y="38" width="7" height="10" rx="1" fill="url(#hqGrad)" stroke="#5E35B1" stroke-width="0.5"/>
    <rect x="46" y="38" width="7" height="10" rx="1" fill="url(#hqGrad)" stroke="#5E35B1" stroke-width="0.5"/>
    <circle cx="14.5" cy="42" r="1.2" fill="#E1BEE7" opacity="0.9"/>
    <circle cx="49.5" cy="42" r="1.2" fill="#E1BEE7" opacity="0.9"/>
    <!-- Central dome -->
    <path d="M18,48 Q18,26 32,20 Q46,26 46,48 Z" fill="url(#hqGrad)" stroke="#5E35B1" stroke-width="0.8"/>
    <!-- Dome highlight -->
    <path d="M22,46 Q22,30 32,24 Q38,28 40,38" fill="#B388FF" opacity="0.2"/>
    <!-- Hublots (portholes) -->
    <circle cx="27" cy="38" r="2.2" fill="#1A0040" stroke="#E1BEE7" stroke-width="0.6"/>
    <circle cx="27" cy="38" r="1.2" fill="#CE93D8" opacity="0.7"/>
    <circle cx="37" cy="38" r="2.2" fill="#1A0040" stroke="#E1BEE7" stroke-width="0.6"/>
    <circle cx="37" cy="38" r="1.2" fill="#CE93D8" opacity="0.7"/>
    <circle cx="32" cy="32" r="2" fill="#1A0040" stroke="#E1BEE7" stroke-width="0.6"/>
    <circle cx="32" cy="32" r="1" fill="#CE93D8" opacity="0.8"/>
    <!-- Central antenna/tower -->
    <line x1="32" y1="20" x2="32" y2="8" stroke="url(#hqAntennaGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="29" y1="14" x2="35" y2="14" stroke="#B388FF" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="30" y1="11" x2="34" y2="11" stroke="#B388FF" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Antenna tip glow -->
    <circle cx="32" cy="7" r="2" fill="#E1BEE7" opacity="0.6"/>
    <circle cx="32" cy="7" r="1" fill="#FFFFFF" opacity="0.8"/>
    <!-- Side tower caps -->
    <polygon points="11,38 14.5,34 18,38" fill="#B388FF" stroke="#5E35B1" stroke-width="0.4"/>
    <polygon points="46,38 49.5,34 53,38" fill="#B388FF" stroke="#5E35B1" stroke-width="0.4"/>
  </g>
</svg>
