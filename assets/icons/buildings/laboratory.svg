<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="labGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#64FFDA"/>
    </linearGradient>
    <filter id="labGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#labGlow)">
    <!-- Base platform -->
    <rect x="8" y="48" width="48" height="6" rx="2" fill="#004D40" stroke="#00695C" stroke-width="1"/>
    <!-- Data readout panel on base -->
    <rect x="14" y="49" width="10" height="4" rx="1" fill="#00332B" stroke="#64FFDA" stroke-width="0.5" stroke-opacity="0.6"/>
    <line x1="16" y1="50.5" x2="22" y2="50.5" stroke="#A7FFEB" stroke-width="0.5" stroke-opacity="0.8"/>
    <line x1="16" y1="51.8" x2="20" y2="51.8" stroke="#A7FFEB" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- Glass dome -->
    <path d="M10 48 L10 30 Q10 14, 32 10 Q54 14, 54 30 L54 48 Z" fill="#64FFDA" fill-opacity="0.12" stroke="#64FFDA" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Dome structural ribs -->
    <line x1="32" y1="10" x2="32" y2="48" stroke="#004D40" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="10" y1="36" x2="54" y2="36" stroke="#004D40" stroke-width="0.8" stroke-opacity="0.6"/>
    <line x1="13" y1="24" x2="51" y2="24" stroke="#004D40" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- Diagonal rib struts -->
    <line x1="20" y1="14" x2="10" y2="36" stroke="#004D40" stroke-width="0.6" stroke-opacity="0.35"/>
    <line x1="44" y1="14" x2="54" y2="36" stroke="#004D40" stroke-width="0.6" stroke-opacity="0.35"/>
    <!-- Erlenmeyer flask (left) -->
    <polygon points="21,47 24,47 25,40 23.5,36 22.5,36 20,40" fill="url(#labGrad)" fill-opacity="0.7" stroke="#004D40" stroke-width="0.8"/>
    <rect x="22" y="33" width="2" height="3" fill="#64FFDA" fill-opacity="0.5" stroke="#004D40" stroke-width="0.5"/>
    <!-- Liquid inside flask -->
    <polygon points="21.5,47 24,47 24.5,42 20.5,42" fill="#64FFDA" fill-opacity="0.4"/>
    <!-- Test tube (center-right) -->
    <rect x="38" y="30" width="3" height="17" rx="1.5" fill="url(#labGrad)" fill-opacity="0.5" stroke="#004D40" stroke-width="0.7"/>
    <!-- Liquid in test tube -->
    <rect x="38.5" y="38" width="2" height="8.5" rx="1" fill="#64FFDA" fill-opacity="0.5"/>
    <!-- Holographic screen -->
    <rect x="28" y="28" width="8" height="6" rx="0.5" fill="#A7FFEB" fill-opacity="0.25" stroke="#A7FFEB" stroke-width="0.7" stroke-opacity="0.8" transform="rotate(-8 32 31)"/>
    <line x1="29.5" y1="30" x2="34.5" y2="29.5" stroke="#A7FFEB" stroke-width="0.5" stroke-opacity="0.7"/>
    <line x1="29.5" y1="32" x2="33.5" y2="31.5" stroke="#A7FFEB" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- Atom symbol (above flask, left area) -->
    <circle cx="16" cy="20" r="1" fill="#A7FFEB" opacity="0.9"/>
    <ellipse cx="16" cy="20" rx="4" ry="1.8" fill="none" stroke="#A7FFEB" stroke-width="0.5" stroke-opacity="0.6"/>
    <ellipse cx="16" cy="20" rx="4" ry="1.8" fill="none" stroke="#A7FFEB" stroke-width="0.5" stroke-opacity="0.6" transform="rotate(60 16 20)"/>
    <ellipse cx="16" cy="20" rx="4" ry="1.8" fill="none" stroke="#A7FFEB" stroke-width="0.5" stroke-opacity="0.6" transform="rotate(-60 16 20)"/>
    <!-- Glowing particles inside dome -->
    <circle cx="45" cy="22" r="1" fill="#A7FFEB" opacity="0.7"/>
    <circle cx="38" cy="18" r="0.7" fill="#A7FFEB" opacity="0.5"/>
    <circle cx="26" cy="42" r="0.8" fill="#A7FFEB" opacity="0.4"/>
    <circle cx="46" cy="40" r="0.6" fill="#A7FFEB" opacity="0.6"/>
    <circle cx="18" cy="42" r="0.7" fill="#A7FFEB" opacity="0.3"/>
    <!-- Antenna on top of dome -->
    <line x1="32" y1="10" x2="32" y2="5" stroke="#64FFDA" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="32" cy="4" r="1.5" fill="#A7FFEB" opacity="0.7"/>
    <circle cx="32" cy="4" r="0.7" fill="#FFFFFF" opacity="0.9"/>
    <!-- Equipment pipe on right side -->
    <rect x="54" y="38" width="6" height="3" rx="1.5" fill="#004D40" stroke="#00695C" stroke-width="0.7"/>
    <circle cx="60" cy="39.5" r="1.2" fill="#00695C"/>
  </g>
</svg>
