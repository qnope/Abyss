<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="spGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#FFD740"/>
    </linearGradient>
    <linearGradient id="spPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B3150"/>
      <stop offset="100%" stop-color="#132238"/>
    </linearGradient>
    <filter id="spGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#spGlow)">
    <!-- Support pillar -->
    <rect x="30" y="36" width="4" height="16" rx="1" fill="#4A5568"/>
    <!-- Panel frame - angled -->
    <path d="M8 20 L56 20 L52 36 L12 36 Z" fill="url(#spPanel)"/>
    <path d="M8 20 L56 20 L52 36 L12 36 Z" fill="none" stroke="#FFD740" stroke-width="1" opacity="0.4"/>
    <!-- Panel grid lines -->
    <line x1="24" y1="20" x2="22" y2="36" stroke="#FFD740" stroke-width="0.5" opacity="0.3"/>
    <line x1="40" y1="20" x2="38" y2="36" stroke="#FFD740" stroke-width="0.5" opacity="0.3"/>
    <line x1="8" y1="26" x2="54" y2="26" stroke="#FFD740" stroke-width="0.5" opacity="0.3"/>
    <line x1="10" y1="32" x2="52" y2="32" stroke="#FFD740" stroke-width="0.5" opacity="0.3"/>
    <!-- Energy glow on panel -->
    <ellipse cx="32" cy="28" rx="10" ry="5" fill="#FFD740" opacity="0.15"/>
    <!-- Energy output indicator -->
    <circle cx="32" cy="44" r="3" fill="url(#spGrad)" opacity="0.7"/>
    <!-- Light rays from top -->
    <line x1="32" y1="6" x2="32" y2="14" stroke="#FFD740" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="22" y1="8" x2="26" y2="15" stroke="#FFD740" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <line x1="42" y1="8" x2="38" y2="15" stroke="#FFD740" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <!-- Base -->
    <ellipse cx="32" cy="52" rx="10" ry="3" fill="#1B3150" opacity="0.6"/>
  </g>
</svg>
