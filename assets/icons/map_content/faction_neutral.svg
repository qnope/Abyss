<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="neutralGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#42A5F5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2A3A50" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="neutralGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Halo: discreet blue glow behind dome -->
  <circle cx="24" cy="26" r="12" fill="#42A5F5" opacity="0.12" filter="url(#neutralGlow)"/>

  <!-- Dome: half-sphere ~22x16px centered -->
  <path d="M13 30 Q13 14 24 14 Q35 14 35 30 Z" fill="url(#neutralGrad)"/>

  <!-- Dome structure: 3 meridian arcs -->
  <path d="M18 30 Q18 18 24 18 Q30 18 30 30" fill="none" stroke="#42A5F5" stroke-width="0.4" opacity="0.3"/>
  <path d="M24 14 L24 30" fill="none" stroke="#42A5F5" stroke-width="0.4" opacity="0.3"/>
  <path d="M15 24 Q19 20 24 19 Q29 20 33 24" fill="none" stroke="#42A5F5" stroke-width="0.4" opacity="0.3"/>

  <!-- Neutrality indicator: handshake symbol at dome top (~3x3px) -->
  <path d="M22.5 15.5 Q23.25 14 24 15.5" fill="none" stroke="#42A5F5" stroke-width="0.5" opacity="0.6"/>
  <path d="M25.5 15.5 Q24.75 14 24 15.5" fill="none" stroke="#42A5F5" stroke-width="0.5" opacity="0.6"/>

  <!-- Base/pedestal: rounded rectangle 24x5px -->
  <rect x="12" y="30" width="24" height="5" rx="2" ry="2" fill="#1A2D47"/>
  <rect x="12" y="30" width="24" height="5" rx="2" ry="2" fill="none" stroke="#42A5F5" stroke-width="0.4" opacity="0.3"/>
</svg>
