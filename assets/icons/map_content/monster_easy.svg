<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="easyDenGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#1A2D47"/>
    </radialGradient>
    <filter id="easyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Green aura behind cave -->
  <ellipse cx="24" cy="34" rx="18" ry="12" fill="#69F0AE" opacity="0.2" filter="url(#easyGlow)"/>

  <!-- Cave opening: irregular rock contour -->
  <path d="M14,38 Q13,36 14,33 Q15,30 17,28 Q18,27 20,27 Q22,26 24,26 Q26,26 28,27 Q30,27 31,28 Q33,30 34,33 Q35,36 34,38 Z" fill="#4A5568"/>
  <path d="M16,38 Q15,35 16,33 Q17,31 19,29 Q21,28 24,28 Q27,28 29,29 Q31,31 32,33 Q33,35 32,38 Z" fill="url(#easyDenGrad)"/>

  <!-- Rock detail edges -->
  <path d="M14,38 Q13.5,36.5 14.5,34" fill="none" stroke="#3A4558" stroke-width="0.8"/>
  <path d="M34,38 Q34.5,36.5 33.5,34" fill="none" stroke="#3A4558" stroke-width="0.8"/>
  <path d="M17,28 Q18,27.5 19,27.8" fill="none" stroke="#3A4558" stroke-width="0.6"/>
  <path d="M29,27.8 Q30,27.5 31,28" fill="none" stroke="#3A4558" stroke-width="0.6"/>

  <!-- Vegetation: algae tufts on rocks -->
  <path d="M15,34 Q14,31 14.5,29 Q15,31 15.5,29.5 Q15.5,31.5 16,34" fill="#69F0AE" opacity="0.4"/>
  <path d="M32,33 Q33,30.5 32.5,28.5 Q33.5,31 34,33" fill="#69F0AE" opacity="0.4"/>

  <!-- Creature silhouette body -->
  <ellipse cx="24" cy="35" rx="3.5" ry="3" fill="#050810" opacity="0.7"/>
  <!-- Left fin/leg -->
  <path d="M20.5,35 Q19,34 18.5,33.5 Q19.5,34.5 20.5,34.5" fill="#050810" opacity="0.7"/>
  <!-- Right fin/leg -->
  <path d="M27.5,35 Q29,34 29.5,33.5 Q28.5,34.5 27.5,34.5" fill="#050810" opacity="0.7"/>
  <!-- Eyes -->
  <circle cx="22.8" cy="34.2" r="0.8" fill="#69F0AE" opacity="0.8"/>
  <circle cx="25.2" cy="34.2" r="0.8" fill="#69F0AE" opacity="0.8"/>

  <!-- 1-star difficulty badge -->
  <circle cx="36" cy="4" r="5" fill="#69F0AE" opacity="0.8"/>
  <polygon points="36,1.2 36.7,3.4 39,3.4 37.1,4.8 37.8,7 36,5.6 34.2,7 34.9,4.8 33,3.4 35.3,3.4" fill="#0A0E1A"/>
