<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="baseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#448AFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0D1B2A" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="baseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <filter id="baseGlow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Primary halo -->
  <circle cx="24" cy="26" r="18" fill="#00E5FF" fill-opacity="0.25" filter="url(#baseGlow)"/>
  <!-- Secondary halo -->
  <circle cx="24" cy="26" r="12" fill="#1DE9B6" fill-opacity="0.15" filter="url(#baseGlow2)"/>
  <!-- Base/pedestal -->
  <rect x="9" y="33" width="30" height="6" rx="2" ry="2" fill="#0D1B2A"/>
  <line x1="9" y1="33" x2="39" y2="33" stroke="#00E5FF" stroke-opacity="0.6" stroke-width="0.5"/>
  <!-- Dome -->
  <path d="M10 33 Q10 13 24 13 Q38 13 38 33 Z" fill="url(#baseGrad)"/>
  <!-- Dome meridian arcs (bottom to top) -->
  <path d="M14 33 Q14 18 24 18 Q34 18 34 33" fill="none" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="0.5"/>
  <path d="M17 33 Q17 20 24 20 Q31 20 31 33" fill="none" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="0.5"/>
  <path d="M20 33 Q20 22 24 22 Q28 22 28 33" fill="none" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="0.5"/>
  <path d="M22.5 33 Q22.5 24 24 24 Q25.5 24 25.5 33" fill="none" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="0.5"/>
  <!-- Dome horizontal arcs -->
  <path d="M12 28 Q24 26 36 28" fill="none" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="0.5"/>
  <path d="M15 23 Q24 21 33 23" fill="none" stroke="#00E5FF" stroke-opacity="0.5" stroke-width="0.5"/>
  <!-- Specular highlights -->
  <circle cx="19" cy="20" r="0.8" fill="#E0F7FA" fill-opacity="0.9"/>
  <circle cx="21" cy="17" r="0.8" fill="#E0F7FA" fill-opacity="0.9"/>
  <circle cx="17" cy="24" r="0.8" fill="#E0F7FA" fill-opacity="0.9"/>
  <circle cx="28" cy="22" r="0.8" fill="#E0F7FA" fill-opacity="0.9"/>
  <!-- Bioluminescent particles -->
  <circle cx="15" cy="16" r="0.5" fill="#00E5FF" fill-opacity="0.4"/>
  <circle cx="33" cy="18" r="0.8" fill="#1DE9B6" fill-opacity="0.3"/>
  <circle cx="30" cy="14" r="0.3" fill="#00E5FF" fill-opacity="0.5"/>
  <circle cx="12" cy="28" r="1" fill="#1DE9B6" fill-opacity="0.2"/>
  <circle cx="36" cy="26" r="0.6" fill="#00E5FF" fill-opacity="0.35"/>
  <circle cx="18" cy="12" r="0.4" fill="#1DE9B6" fill-opacity="0.45"/>
  <circle cx="29" cy="30" r="0.7" fill="#00E5FF" fill-opacity="0.25"/>
</svg>
