<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A5070"/>
      <stop offset="100%" stop-color="#2A3A50"/>
    </linearGradient>
    <linearGradient id="chestGlowGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFD740" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD740" stop-opacity="0"/>
    </linearGradient>
    <filter id="chestGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>
  <!-- Shadow -->
  <ellipse cx="24" cy="38" rx="14" ry="3" fill="#0A0E1A" fill-opacity="0.3"/>
  <!-- Golden light beam -->
  <path d="M18 28 L24 10 L30 28 Z" fill="url(#chestGlowGrad)" filter="url(#chestGlow)"/>
  <!-- Golden particles -->
  <rect x="20" y="14" width="1.2" height="1.2" transform="rotate(45 20.6 14.6)" fill="#FFD740" fill-opacity="0.7"/>
  <rect x="27" y="16" width="1" height="1" transform="rotate(45 27.5 16.5)" fill="#FFD740" fill-opacity="0.55"/>
  <rect x="16" y="18" width="1.4" height="1.4" transform="rotate(45 16.7 18.7)" fill="#FFD740" fill-opacity="0.5"/>
  <rect x="30" y="20" width="1" height="1" transform="rotate(45 30.5 20.5)" fill="#FFD740" fill-opacity="0.4"/>
  <rect x="22" y="12" width="1.2" height="1.2" transform="rotate(45 22.6 12.6)" fill="#FFD740" fill-opacity="0.6"/>
  <circle cx="18.5" cy="22" r="0.6" fill="#FFD740" fill-opacity="0.45"/>
  <!-- Chest body -->
  <rect x="12" y="28" rx="1.5" ry="1.5" width="24" height="9" fill="url(#chestGrad)"/>
  <!-- Metal bands -->
  <line x1="12" y1="31" x2="36" y2="31" stroke="#5A7090" stroke-width="0.8"/>
  <line x1="12" y1="34" x2="36" y2="34" stroke="#5A7090" stroke-width="0.8"/>
  <!-- Chest lid -->
  <g transform="rotate(-18 12 28)">
    <rect x="12" y="22" rx="1.5" ry="1.5" width="24" height="6" fill="url(#chestGrad)"/>
    <line x1="12" y1="25" x2="36" y2="25" stroke="#5A7090" stroke-width="0.8"/>
  </g>
</svg>
