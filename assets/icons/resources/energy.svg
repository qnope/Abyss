<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="energyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <radialGradient id="energyRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
    <filter id="energyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#energyGlow)">
    <polygon points="36,4 18,30 28,30 22,60 46,26 34,26 42,4" fill="url(#energyGrad)"/>
    <circle cx="14" cy="20" r="1.2" fill="url(#energyRadial)" opacity="0.7"/>
    <circle cx="50" cy="18" r="1" fill="url(#energyRadial)" opacity="0.6"/>
    <circle cx="12" cy="40" r="1" fill="url(#energyRadial)" opacity="0.5"/>
    <circle cx="52" cy="42" r="1.2" fill="url(#energyRadial)" opacity="0.6"/>
    <line x1="10" y1="28" x2="14" y2="30" stroke="#FFD740" stroke-width="0.8" opacity="0.5"/>
    <line x1="54" y1="30" x2="50" y2="32" stroke="#FFD740" stroke-width="0.8" opacity="0.5"/>
    <line x1="48" y1="50" x2="50" y2="48" stroke="#FFD740" stroke-width="0.8" opacity="0.4"/>
    <line x1="16" y1="50" x2="14" y2="48" stroke="#FFD740" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>
