<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="faultLavaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="35%" stop-color="#FF4500"/>
      <stop offset="65%" stop-color="#FF5252"/>
      <stop offset="100%" stop-color="#FF8A65"/>
    </linearGradient>
    <filter id="faultGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="blur1" stdDeviation="1.5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background layer -->
  <rect x="0" y="0" width="48" height="48" fill="#1A1A2E" opacity="1"/>
  <!-- Basalt texture left -->
  <path d="M2,18 L6,16 L8,19 L6,22 L2,21 Z" fill="#1F1F35" opacity="0.3" stroke="#1F1F35" stroke-width="0.3"/>
  <path d="M1,24 L4,22 L7,24 L6,28 L3,28 Z" fill="#1F1F35" opacity="0.3" stroke="#1F1F35" stroke-width="0.3"/>
  <path d="M3,30 L7,29 L9,32 L7,35 L3,34 Z" fill="#1F1F35" opacity="0.3" stroke="#1F1F35" stroke-width="0.3"/>
  <!-- Basalt texture right -->
  <path d="M40,14 L44,13 L46,16 L44,19 L40,18 Z" fill="#1F1F35" opacity="0.3" stroke="#1F1F35" stroke-width="0.3"/>
  <path d="M39,21 L43,20 L45,23 L43,26 L39,25 Z" fill="#1F1F35" opacity="0.3" stroke="#1F1F35" stroke-width="0.3"/>
  <path d="M41,28 L45,27 L47,30 L45,33 L41,32 Z" fill="#1F1F35" opacity="0.3" stroke="#1F1F35" stroke-width="0.3"/>
  <!-- Secondary cracks radiating from main fissure -->
  <path d="M16,18 L10,14" fill="none" stroke="#2A1A3E" stroke-width="0.4"/>
  <path d="M20,22 L14,20" fill="none" stroke="#2A1A3E" stroke-width="0.3"/>
  <path d="M26,28 L33,25" fill="none" stroke="#2A1A3E" stroke-width="0.5"/>
  <path d="M30,33 L37,31" fill="none" stroke="#2A1A3E" stroke-width="0.4"/>
  <path d="M22,25 L16,28" fill="none" stroke="#2A1A3E" stroke-width="0.3"/>
  <path d="M28,30 L34,35" fill="none" stroke="#2A1A3E" stroke-width="0.4"/>
  <!-- Volcanic glow along fissure -->
  <path d="M18,10 L16,15 L20,19 L18,23 L22,26 L20,30 L24,33 L22,36 L26,38 L30,42" fill="#FF5252" opacity="0.4" stroke="none" filter="url(#faultGlow)"/>
  <!-- Central fissure (jagged asymmetric path) -->
  <path d="M19,8 L17,12 L20,14 L16,18 L21,20 L18,24 L23,26 L20,29 L25,31 L22,34 L27,36 L24,39 L28,42 L26,42 L22,39 L25,36 L20,34 L23,31 L18,29 L21,26 L16,24 L19,20 L14,18 L18,14 L15,12 L17,8 Z" fill="url(#faultLavaGrad)"/>
  <!-- Heat points inside fissure -->
  <circle cx="18" cy="21" r="1" fill="#FFD740" opacity="0.7"/>
  <circle cx="22" cy="30" r="0.8" fill="#FFD740" opacity="0.7"/>
  <circle cx="25" cy="37" r="0.9" fill="#FFD740" opacity="0.7"/>
  <!-- Suspended particles near fissure -->
  <circle cx="14" cy="16" r="1" fill="#FF8A65" opacity="0.5"/>
  <circle cx="26" cy="22" r="1.2" fill="#FF8A65" opacity="0.5"/>
  <circle cx="28" cy="35" r="0.8" fill="#FF8A65" opacity="0.5"/>
  <circle cx="15" cy="27" r="1.5" fill="#FF8A65" opacity="0.5"/>
  <!-- Suspended particles far from fissure -->
  <circle cx="8" cy="12" r="0.7" fill="#FF5252" opacity="0.15"/>
  <circle cx="38" cy="20" r="1" fill="#FF5252" opacity="0.15"/>
  <circle cx="6" cy="36" r="0.5" fill="#FF5252" opacity="0.15"/>
  <circle cx="40" cy="38" r="0.8" fill="#FF5252" opacity="0.15"/>
</svg>
