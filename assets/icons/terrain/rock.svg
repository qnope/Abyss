<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rockMainGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5A6678"/>
      <stop offset="1" stop-color="#3A4558"/>
    </linearGradient>
  </defs>
  <!-- Background layer -->
  <rect width="48" height="48" fill="#4A5568" opacity="1"/>
  <!-- Perimeter shadow (inner border) -->
  <rect x="1" y="1" width="46" height="46" fill="none" stroke="#2D3748" stroke-width="1.5" opacity="0.4"/>
  <!-- Main rock mass -->
  <polygon points="5,10 12,4 22,3 36,5 43,12 44,26 42,38 34,43 20,44 8,40 3,30 4,18" fill="url(#rockMainGrad)"/>
  <!-- Fissures -->
  <!-- Main fissure: upper-left to lower-right -->
  <polyline points="10,11 14,15 12,19 16,22 19,20 22,25 26,28 24,32" fill="none" stroke="#2D3748" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Secondary fissure branching from main -->
  <polyline points="16,22 19,24 21,22" fill="none" stroke="#2D3748" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Secondary fissure 2 -->
  <polyline points="30,9 28,14 31,18 29,22" fill="none" stroke="#2D3748" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Secondary fissure 3 -->
  <polyline points="36,20 33,25 35,30 32,34" fill="none" stroke="#2D3748" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Secondary fissure 4 -->
  <polyline points="12,30 15,33 13,37" fill="none" stroke="#2D3748" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Mineral reflections on upper faces -->
  <ellipse cx="18" cy="9" rx="1.5" ry="1" fill="#6B7C8F" opacity="0.6"/>
  <ellipse cx="30" cy="7" rx="1.2" ry="1" fill="#6B7C8F" opacity="0.6"/>
  <ellipse cx="38" cy="14" rx="1" ry="1.3" fill="#6B7C8F" opacity="0.6"/>
  <!-- Sediment at base -->
  <polygon points="8,44 10,42 12,44" fill="#3A4558"/>
  <polygon points="16,44 17,42 19,44" fill="#3A4558"/>
  <polygon points="23,44 25,42 27,44" fill="#3A4558"/>
  <polygon points="30,44 31,43 33,44" fill="#3A4558"/>
  <polygon points="36,44 38,42 40,44" fill="#3A4558"/>
  <!-- Micro-organisms on rock surface -->
  <circle cx="25" cy="18" r="1.2" fill="#5A6678" opacity="0.5"/>
  <circle cx="15" cy="28" r="1" fill="#5A6678" opacity="0.5"/>
</svg>
