<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Rock gradient (bottom-to-top, dark to brown) -->
    <linearGradient id="vkRockGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <!-- Lava gradient (bottom-to-top, red to orange) -->
    <linearGradient id="vkLavaGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF3D00"/>
      <stop offset="100%" stop-color="#FF9100"/>
    </linearGradient>
    <!-- Crater glow (radial, bright center fading out) -->
    <radialGradient id="vkCraterGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFAB00" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FF6D00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0"/>
    </radialGradient>
    <!-- Hydrothermal plume gradient (opaque cyan to transparent teal) -->
    <linearGradient id="vkPlumeGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </linearGradient>
    <!-- Ember glow (radial, bright center to edge) -->
    <radialGradient id="vkEmberGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFAB00"/>
      <stop offset="100%" stop-color="#FF6D00"/>
    </radialGradient>
    <!-- Seabed gradient (dark grays) -->
    <linearGradient id="vkSeabedGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#1B1B1B"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="vkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === Seabed base layer === -->
  <path d="M0 54 Q4 52, 8 54 Q14 56, 20 53 Q28 55, 36 54 Q44 56, 52 53 Q58 55, 64 54 L64 64 L0 64 Z" fill="url(#vkSeabedGrad)"/>
  <!-- Scattered small rocks on seabed -->
  <path d="M5 58 L7 56 L9 57 L8 59 Z" fill="#252525" opacity="0.7"/>
  <path d="M50 57 L53 55 L55 56 L54 58 Z" fill="#222222" opacity="0.6"/>
  <path d="M30 59 L32 57 L34 58 L33 60 Z" fill="#262626" opacity="0.5"/>
  <path d="M18 60 L20 58 L21 59 Z" fill="#232323" opacity="0.6"/>

  <!-- === Volcano body silhouette === -->
  <path d="M8 52 Q10 50, 14 48 Q16 44, 18 40 Q20 36, 22 30 Q24 24, 26 20 Q27 17, 28 16 Q29 18, 31 22 Q33 26, 36 32 Q39 38, 42 42 Q46 46, 50 48 Q54 50, 56 52 Z" fill="url(#vkRockGrad)"/>

  <!-- Rock texture overlays (wavy horizontal lines) -->
  <path d="M14 46 Q20 45, 26 46 Q32 47, 38 46 Q44 45, 50 46" fill="none" stroke="#2A1F1A" stroke-width="0.6" opacity="0.5"/>
  <path d="M18 40 Q24 39, 30 40 Q36 41, 42 40" fill="none" stroke="#1F1510" stroke-width="0.5" opacity="0.4"/>
  <path d="M22 34 Q26 33, 30 34 Q34 35, 38 34" fill="none" stroke="#251A14" stroke-width="0.5" opacity="0.35"/>

  <!-- Crack/ridge strokes on surface -->
  <path d="M20 42 L22 38" fill="none" stroke="#4E342E" stroke-width="0.7" opacity="0.5"/>
  <path d="M35 36 L37 32" fill="none" stroke="#4E342E" stroke-width="0.6" opacity="0.45"/>
  <path d="M40 44 L43 40" fill="none" stroke="#4E342E" stroke-width="0.8" opacity="0.4"/>
  <path d="M16 46 L18 43" fill="none" stroke="#4E342E" stroke-width="0.5" opacity="0.55"/>
  <path d="M28 28 L30 25" fill="none" stroke="#4E342E" stroke-width="0.6" opacity="0.6"/>

  <!-- Shadow patches on right flank -->
  <path d="M38 34 Q42 38, 46 42 Q48 44, 50 48 L44 46 Q40 40, 38 36 Z" fill="#1A1A1A" opacity="0.3"/>
  <path d="M42 42 Q46 46, 52 50 L48 50 Q44 46, 42 44 Z" fill="#1A1A1A" opacity="0.25"/>
  <path d="M34 30 Q36 32, 40 36 L38 36 Q35 33, 34 31 Z" fill="#1A1A1A" opacity="0.2"/>

  <!-- === Crater at peak === -->
  <!-- Crater rim -->
  <ellipse cx="28" cy="18" rx="6" ry="3" fill="none" stroke="#2A1F1A" stroke-width="1" opacity="0.7"/>
  <!-- Crater inner glow -->
  <ellipse cx="28" cy="18" rx="5" ry="2.5" fill="url(#vkCraterGlow)"/>
  <!-- Bright center of crater -->
  <circle cx="28" cy="18" r="1.5" fill="#FFAB00" opacity="0.9"/>

  <!-- === Lava flows === -->
  <!-- Lava flow 1 glow (left flank, behind main stroke) -->
  <path d="M24 20 Q22 26, 18 34 Q16 40, 14 48" fill="none" stroke="#FF3D00" stroke-width="4" stroke-linecap="round" opacity="0.25" filter="url(#vkGlow)"/>
  <!-- Lava flow 1 (left flank) -->
  <path d="M24 20 Q22 26, 18 34 Q16 40, 14 48" fill="none" stroke="#FF3D00" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <!-- Lava flow 2 (right flank) -->
  <path d="M32 20 Q34 28, 38 36 Q42 44, 46 50" fill="none" stroke="#FF6D00" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <!-- Lava flow 3 (short, left-center) -->
  <path d="M26 22 Q24 28, 22 34" fill="none" stroke="#FF9100" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- === Side vent === -->
  <!-- Crack in rock at side vent -->
  <path d="M40 34 L44 36 L42 38" fill="none" stroke="#4E342E" stroke-width="0.8" opacity="0.7"/>
  <!-- Side vent lava glow -->
  <ellipse cx="42" cy="36" rx="2.5" ry="1.5" fill="#FF6D00" opacity="0.6" filter="url(#vkGlow)"/>
  <!-- Side vent bright center -->
  <circle cx="42" cy="36" r="1" fill="#FFAB00" opacity="0.7"/>
  <!-- Side vent vapor wisp -->
  <path d="M43 35 Q45 32, 44 28" fill="none" stroke="#00E5FF" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>

</svg>
