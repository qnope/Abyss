<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="siphonerSuit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </linearGradient>
    <linearGradient id="siphonerCircuit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    <linearGradient id="siphonerViolet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A148C"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="siphonerBracelet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B388FF"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#B388FF"/>
    </linearGradient>
    <radialGradient id="siphonerMask" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </radialGradient>
    <radialGradient id="siphonerAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A148C" stop-opacity="0"/>
    </radialGradient>
    <filter id="siphonerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#siphonerGlow)">
    <!-- Floating aura beneath the figure -->
    <ellipse cx="32" cy="58" rx="10" ry="3" fill="url(#siphonerAura)" opacity="0.5"/>
    <!-- Faint violet glow under feet to indicate levitation -->
    <ellipse cx="32" cy="56" rx="5" ry="1.5" fill="#7C4DFF" opacity="0.15"/>
    <!-- Head - smooth oval mirror mask -->
    <ellipse cx="32" cy="12" rx="5" ry="6" fill="url(#siphonerSuit)" stroke="#4A148C" stroke-width="0.5"/>
    <!-- Mirror mask face - featureless reflective surface -->
    <ellipse cx="32" cy="12" rx="4" ry="5" fill="url(#siphonerMask)" stroke="#37474F" stroke-width="0.3"/>
    <!-- Mask reflective highlight - top left -->
    <ellipse cx="30" cy="10" rx="1.8" ry="2.5" fill="#37474F" opacity="0.4"/>
    <!-- Mask reflective highlight - small bright spot -->
    <ellipse cx="30.5" cy="9.5" rx="0.8" ry="1" fill="#546E7A" opacity="0.3"/>
    <!-- Mask edge glow - faint violet outline -->
    <ellipse cx="32" cy="12" rx="4.2" ry="5.2" fill="none" stroke="#7C4DFF" stroke-width="0.3" opacity="0.4"/>
    <!-- Neck -->
    <rect x="30.5" y="17.5" width="3" height="2.5" rx="0.5" fill="url(#siphonerSuit)" stroke="#4A148C" stroke-width="0.3"/>
    <!-- Neck circuit line -->
    <line x1="32" y1="17.5" x2="32" y2="20" stroke="#E040FB" stroke-width="0.4" opacity="0.7"/>
    <!-- Torso - slender androgynous shape -->
    <path d="M27,20 L37,20 L38.5,25 L39,34 L37,36 L27,36 L25,34 L25.5,25 Z" fill="url(#siphonerSuit)" stroke="#4A148C" stroke-width="0.5"/>
    <!-- Torso circuit - center vertical line -->
    <line x1="32" y1="20" x2="32" y2="36" stroke="#E040FB" stroke-width="0.5" opacity="0.8"/>
    <!-- Torso circuit - branching left diagonal -->
    <line x1="32" y1="23" x2="27" y2="28" stroke="#E040FB" stroke-width="0.35" opacity="0.6"/>
    <!-- Torso circuit - branching right diagonal -->
    <line x1="32" y1="23" x2="37" y2="28" stroke="#E040FB" stroke-width="0.35" opacity="0.6"/>
    <!-- Torso circuit - horizontal rib left -->
    <line x1="27" y1="28" x2="32" y2="30" stroke="#E040FB" stroke-width="0.3" opacity="0.5"/>
    <!-- Torso circuit - horizontal rib right -->
    <line x1="37" y1="28" x2="32" y2="30" stroke="#E040FB" stroke-width="0.3" opacity="0.5"/>
    <!-- Torso circuit - lower left branch -->
    <line x1="32" y1="30" x2="28" y2="35" stroke="#E040FB" stroke-width="0.3" opacity="0.5"/>
    <!-- Torso circuit - lower right branch -->
    <line x1="32" y1="30" x2="36" y2="35" stroke="#E040FB" stroke-width="0.3" opacity="0.5"/>
    <!-- Circuit junction nodes on torso -->
    <circle cx="32" cy="23" r="0.7" fill="#E040FB" opacity="0.9"/>
    <circle cx="32" cy="30" r="0.6" fill="#E040FB" opacity="0.8"/>
    <circle cx="27" cy="28" r="0.5" fill="#B388FF" opacity="0.7"/>
    <circle cx="37" cy="28" r="0.5" fill="#B388FF" opacity="0.7"/>
    <!-- Left arm - relaxed along body, open hand -->
    <path d="M27,21 L24,24 L22,30 L21,36 L22,37 L23.5,31 L25,25 L28,22 Z" fill="url(#siphonerSuit)" stroke="#4A148C" stroke-width="0.4"/>
    <!-- Left arm circuit line -->
    <line x1="26" y1="22" x2="22" y2="35" stroke="#E040FB" stroke-width="0.35" opacity="0.7"/>
    <!-- Left arm circuit branch -->
    <line x1="24" y1="27" x2="22.5" y2="29" stroke="#E040FB" stroke-width="0.25" opacity="0.5"/>
    <!-- Left arm circuit node -->
    <circle cx="24" cy="27" r="0.4" fill="#E040FB" opacity="0.7"/>
    <!-- Left wrist holographic bracelet -->
    <ellipse cx="21.5" cy="36" rx="1.8" ry="0.8" fill="url(#siphonerBracelet)" opacity="0.85" stroke="#B388FF" stroke-width="0.3"/>
    <ellipse cx="21.5" cy="36" rx="2.5" ry="1.2" fill="none" stroke="#7C4DFF" stroke-width="0.3" opacity="0.4"/>
    <!-- Left bracelet data projections - small streaks -->
    <line x1="19" y1="35" x2="17" y2="34" stroke="#B388FF" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <line x1="19" y1="36.5" x2="16.5" y2="37" stroke="#7C4DFF" stroke-width="0.3" opacity="0.4" stroke-linecap="round"/>
    <line x1="19.5" y1="37.5" x2="17.5" y2="39" stroke="#B388FF" stroke-width="0.35" opacity="0.35" stroke-linecap="round"/>
    <!-- Left bracelet data dots -->
    <circle cx="16.5" cy="34" r="0.4" fill="#B388FF" opacity="0.6"/>
    <circle cx="16" cy="37" r="0.3" fill="#7C4DFF" opacity="0.5"/>
    <circle cx="17" cy="39.5" r="0.35" fill="#B388FF" opacity="0.4"/>
    <!-- Left open hand -->
    <path d="M21,37 L20,39 L19.5,40.5 L20.5,41 L21.5,39.5 L22.5,38 Z" fill="#0D0D1A" stroke="#4A148C" stroke-width="0.3"/>
    <!-- Left hand fingers spread open -->
    <line x1="20" y1="39.5" x2="19" y2="41" stroke="#0D0D1A" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="20.5" y1="40" x2="19.5" y2="42" stroke="#0D0D1A" stroke-width="0.4" stroke-linecap="round"/>
    <line x1="21" y1="40.5" x2="20.5" y2="42.5" stroke="#0D0D1A" stroke-width="0.4" stroke-linecap="round"/>
    <!-- Right arm - relaxed along body, open hand -->
    <path d="M37,21 L40,24 L42,30 L43,36 L42,37 L40.5,31 L39,25 L36,22 Z" fill="url(#siphonerSuit)" stroke="#4A148C" stroke-width="0.4"/>
    <!-- Right arm circuit line -->
    <line x1="38" y1="22" x2="42" y2="35" stroke="#E040FB" stroke-width="0.35" opacity="0.7"/>
    <!-- Right arm circuit branch -->
    <line x1="40" y1="27" x2="41.5" y2="29" stroke="#E040FB" stroke-width="0.25" opacity="0.5"/>
    <!-- Right arm circuit node -->
    <circle cx="40" cy="27" r="0.4" fill="#E040FB" opacity="0.7"/>
    <!-- Right wrist holographic bracelet -->
    <ellipse cx="42.5" cy="36" rx="1.8" ry="0.8" fill="url(#siphonerBracelet)" opacity="0.85" stroke="#B388FF" stroke-width="0.3"/>
    <ellipse cx="42.5" cy="36" rx="2.5" ry="1.2" fill="none" stroke="#7C4DFF" stroke-width="0.3" opacity="0.4"/>
    <!-- Right bracelet data projections - small streaks -->
    <line x1="45" y1="35" x2="47" y2="34" stroke="#B388FF" stroke-width="0.4" opacity="0.5" stroke-linecap="round"/>
    <line x1="45" y1="36.5" x2="47.5" y2="37" stroke="#7C4DFF" stroke-width="0.3" opacity="0.4" stroke-linecap="round"/>
    <line x1="44.5" y1="37.5" x2="46.5" y2="39" stroke="#B388FF" stroke-width="0.35" opacity="0.35" stroke-linecap="round"/>
    <!-- Right bracelet data dots -->
    <circle cx="47.5" cy="34" r="0.4" fill="#B388FF" opacity="0.6"/>
    <circle cx="48" cy="37" r="0.3" fill="#7C4DFF" opacity="0.5"/>
    <circle cx="47" cy="39.5" r="0.35" fill="#B388FF" opacity="0.4"/>
    <!-- Right open hand -->
    <path d="M43,37 L44,39 L44.5,40.5 L43.5,41 L42.5,39.5 L41.5,38 Z" fill="#0D0D1A" stroke="#4A148C" stroke-width="0.3"/>
    <!-- Right hand fingers spread open -->
    <line x1="44" y1="39.5" x2="45" y2="41" stroke="#0D0D1A" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="43.5" y1="40" x2="44.5" y2="42" stroke="#0D0D1A" stroke-width="0.4" stroke-linecap="round"/>
    <line x1="43" y1="40.5" x2="43.5" y2="42.5" stroke="#0D0D1A" stroke-width="0.4" stroke-linecap="round"/>
    <!-- Left leg - slim, floating -->
    <path d="M28,36 L27,42 L26.5,48 L27,52 L29,52 L29.5,48 L30,42 L31,37 Z" fill="url(#siphonerSuit)" stroke="#4A148C" stroke-width="0.4"/>
    <!-- Left leg circuit line -->
    <line x1="29" y1="37" x2="28" y2="51" stroke="#E040FB" stroke-width="0.3" opacity="0.5"/>
    <!-- Left leg circuit node at knee -->
    <circle cx="28.5" cy="44" r="0.4" fill="#E040FB" opacity="0.6"/>
    <!-- Left foot - pointed, floating -->
    <path d="M27,52 L25.5,53.5 L27,54.5 L29,53 L29,52 Z" fill="#0D0D1A" stroke="#4A148C" stroke-width="0.3"/>
    <!-- Right leg - slim, floating -->
    <path d="M34,36 L35,42 L35.5,48 L35,52 L33,52 L32.5,48 L32,42 L33,37 Z" fill="url(#siphonerSuit)" stroke="#4A148C" stroke-width="0.4"/>
    <!-- Right leg circuit line -->
    <line x1="33" y1="37" x2="34" y2="51" stroke="#E040FB" stroke-width="0.3" opacity="0.5"/>
    <!-- Right leg circuit node at knee -->
    <circle cx="33.5" cy="44" r="0.4" fill="#E040FB" opacity="0.6"/>
    <!-- Right foot - pointed, floating -->
    <path d="M35,52 L36.5,53.5 L35,54.5 L33,53 L33,52 Z" fill="#0D0D1A" stroke="#4A148C" stroke-width="0.3"/>
    <!-- Floating gap indicator - faint energy wisps below feet -->
    <line x1="26" y1="55.5" x2="28" y2="57" stroke="#7C4DFF" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>
    <line x1="34" y1="55.5" x2="36" y2="57" stroke="#7C4DFF" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>
    <line x1="30" y1="56" x2="31" y2="58" stroke="#B388FF" stroke-width="0.3" opacity="0.25" stroke-linecap="round"/>
    <line x1="33" y1="56" x2="32" y2="58" stroke="#B388FF" stroke-width="0.3" opacity="0.25" stroke-linecap="round"/>
    <!-- Ambient violet particles around figure -->
    <circle cx="18" cy="20" r="0.5" fill="#B388FF" opacity="0.35"/>
    <circle cx="46" cy="22" r="0.4" fill="#7C4DFF" opacity="0.3"/>
    <circle cx="15" cy="30" r="0.35" fill="#E040FB" opacity="0.25"/>
    <circle cx="49" cy="32" r="0.45" fill="#B388FF" opacity="0.3"/>
    <circle cx="20" cy="45" r="0.3" fill="#7C4DFF" opacity="0.2"/>
    <circle cx="44" cy="47" r="0.35" fill="#E040FB" opacity="0.25"/>
    <circle cx="14" cy="38" r="0.4" fill="#B388FF" opacity="0.2"/>
    <circle cx="50" cy="26" r="0.3" fill="#7C4DFF" opacity="0.2"/>
  </g>
</svg>
