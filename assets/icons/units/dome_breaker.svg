<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="breakSuit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#546E7A"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="disruptorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="breakGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#breakGlow)">
    <!-- Generateur dorsal cylindrique -->
    <rect x="28" y="16" width="10" height="18" rx="5" fill="url(#disruptorGrad)" stroke="#BF360C" stroke-width="0.6"/>
    <!-- Lueur orange pulsante -->
    <ellipse cx="33" cy="25" rx="3.5" ry="7" fill="#FFB74D" opacity="0.3"/>
    <ellipse cx="33" cy="25" rx="2" ry="5" fill="#FFCC80" opacity="0.2"/>
    <!-- Corps trapu -->
    <ellipse cx="30" cy="32" rx="10" ry="11" fill="url(#breakSuit)" stroke="#263238" stroke-width="0.6"/>
    <!-- Poches et modules electroniques -->
    <rect x="22" y="28" width="4" height="3" rx="0.5" fill="#455A64" stroke="#263238" stroke-width="0.3"/>
    <rect x="22" y="33" width="4" height="3" rx="0.5" fill="#455A64" stroke="#263238" stroke-width="0.3"/>
    <rect x="34" y="30" width="3" height="3" rx="0.5" fill="#455A64" stroke="#263238" stroke-width="0.3"/>
    <!-- Casque avec antennes -->
    <circle cx="30" cy="14" r="6" fill="url(#breakSuit)" stroke="#263238" stroke-width="0.6"/>
    <!-- Antennes et analyseurs -->
    <line x1="26" y1="9" x2="24" y2="4" stroke="#90A4AE" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="24" cy="4" r="1" fill="#FF9800" opacity="0.8"/>
    <line x1="30" y1="8" x2="30" y2="3" stroke="#90A4AE" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="30" cy="3" r="1" fill="#FF9800" opacity="0.8"/>
    <line x1="34" y1="9" x2="36" y2="5" stroke="#90A4AE" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="36" cy="5" r="1" fill="#FF9800" opacity="0.8"/>
    <!-- Visiere -->
    <ellipse cx="30" cy="15" rx="4" ry="2" fill="#263238" stroke="#37474F" stroke-width="0.3"/>
    <ellipse cx="30" cy="15" rx="2.5" ry="1" fill="#FF9800" opacity="0.5"/>
    <!-- Bras avec gants amplificateurs -->
    <line x1="20" y1="26" x2="12" y2="34" stroke="url(#breakSuit)" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="26" x2="48" y2="34" stroke="url(#breakSuit)" stroke-width="3" stroke-linecap="round"/>
    <!-- Gants avec electrodes -->
    <circle cx="11" cy="35" r="3" fill="#455A64" stroke="#263238" stroke-width="0.5"/>
    <circle cx="49" cy="35" r="3" fill="#455A64" stroke="#263238" stroke-width="0.5"/>
    <!-- Electrodes aux doigts -->
    <line x1="9" y1="33" x2="7" y2="31" stroke="#FFB74D" stroke-width="0.6"/>
    <line x1="10" y1="37" x2="8" y2="39" stroke="#FFB74D" stroke-width="0.6"/>
    <line x1="50" y1="33" x2="52" y2="31" stroke="#FFB74D" stroke-width="0.6"/>
    <line x1="51" y1="37" x2="53" y2="39" stroke="#FFB74D" stroke-width="0.6"/>
    <!-- Arcs d'energie -->
    <path d="M8 32 Q5 28 8 24" fill="none" stroke="#FF9800" stroke-width="0.5" opacity="0.6"/>
    <path d="M53 32 Q56 28 53 24" fill="none" stroke="#FF9800" stroke-width="0.5" opacity="0.6"/>
    <!-- Cables bras-generateur -->
    <path d="M14 34 Q18 28 28 22" fill="none" stroke="#FF9800" stroke-width="0.8" opacity="0.6"/>
    <path d="M46 34 Q42 28 38 22" fill="none" stroke="#FF9800" stroke-width="0.8" opacity="0.6"/>
    <!-- Jambes trapues -->
    <line x1="27" y1="42" x2="24" y2="52" stroke="url(#breakSuit)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="33" y1="42" x2="36" y2="52" stroke="url(#breakSuit)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Bottes -->
    <ellipse cx="24" cy="53" rx="4" ry="2" fill="#37474F" stroke="#263238" stroke-width="0.4"/>
    <ellipse cx="36" cy="53" rx="4" ry="2" fill="#37474F" stroke="#263238" stroke-width="0.4"/>
  </g>
</svg>
