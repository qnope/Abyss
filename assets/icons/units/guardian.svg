<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="guardArmor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#78909C"/>
    </linearGradient>
    <linearGradient id="coralPlate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#90A4AE"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
    <filter id="guardGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#guardGlow)">
    <!-- Corps massif avec exosquelette -->
    <ellipse cx="32" cy="32" rx="14" ry="16" fill="url(#guardArmor)" stroke="#546E7A" stroke-width="0.8"/>
    <!-- Plaques de corail fossilise -->
    <ellipse cx="32" cy="26" rx="10" ry="5" fill="url(#coralPlate)" stroke="#90A4AE" stroke-width="0.5" opacity="0.7"/>
    <ellipse cx="32" cy="34" rx="11" ry="4" fill="url(#coralPlate)" stroke="#90A4AE" stroke-width="0.5" opacity="0.6"/>
    <!-- Casque dome blinde -->
    <circle cx="32" cy="14" r="7" fill="url(#guardArmor)" stroke="#546E7A" stroke-width="0.8"/>
    <!-- Pas de visiere - capteurs lateraux -->
    <circle cx="25.5" cy="14" r="1.5" fill="#455A64" stroke="#37474F" stroke-width="0.4"/>
    <circle cx="25.5" cy="14" r="0.7" fill="#80CBC4" opacity="0.8"/>
    <circle cx="38.5" cy="14" r="1.5" fill="#455A64" stroke="#37474F" stroke-width="0.4"/>
    <circle cx="38.5" cy="14" r="0.7" fill="#80CBC4" opacity="0.8"/>
    <!-- Epaules massives -->
    <ellipse cx="18" cy="22" rx="6" ry="5" fill="url(#coralPlate)" stroke="#90A4AE" stroke-width="0.6"/>
    <ellipse cx="46" cy="22" rx="6" ry="5" fill="url(#coralPlate)" stroke="#90A4AE" stroke-width="0.6"/>
    <!-- Bouclier convexe (main gauche) -->
    <ellipse cx="12" cy="34" rx="7" ry="10" fill="url(#shieldGrad)" stroke="#37474F" stroke-width="0.8"/>
    <!-- Rayures d'impact sur le bouclier -->
    <line x1="8" y1="28" x2="14" y2="30" stroke="#455A64" stroke-width="0.6" opacity="0.5"/>
    <line x1="9" y1="33" x2="16" y2="34" stroke="#455A64" stroke-width="0.5" opacity="0.4"/>
    <line x1="7" y1="38" x2="13" y2="37" stroke="#455A64" stroke-width="0.6" opacity="0.5"/>
    <line x1="10" y1="41" x2="15" y2="40" stroke="#455A64" stroke-width="0.4" opacity="0.3"/>
    <!-- Bras droit -->
    <line x1="46" y1="26" x2="50" y2="38" stroke="url(#guardArmor)" stroke-width="4" stroke-linecap="round"/>
    <!-- Poing -->
    <circle cx="50" cy="40" r="3" fill="url(#coralPlate)" stroke="#90A4AE" stroke-width="0.5"/>
    <!-- Jambes lourdes -->
    <rect x="24" y="44" width="7" height="12" rx="2" fill="url(#guardArmor)" stroke="#546E7A" stroke-width="0.5"/>
    <rect x="33" y="44" width="7" height="12" rx="2" fill="url(#guardArmor)" stroke="#546E7A" stroke-width="0.5"/>
    <!-- Bottes magnetiques lourdes -->
    <rect x="22" y="54" width="11" height="4" rx="1.5" fill="#455A64" stroke="#37474F" stroke-width="0.5"/>
    <rect x="31" y="54" width="11" height="4" rx="1.5" fill="#455A64" stroke="#37474F" stroke-width="0.5"/>
    <!-- Detail magnetique bottes -->
    <circle cx="27" cy="56" r="1" fill="#80CBC4" opacity="0.5"/>
    <circle cx="37" cy="56" r="1" fill="#80CBC4" opacity="0.5"/>
  </g>
</svg>
