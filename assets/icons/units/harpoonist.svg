<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="harpSuit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="harpWeapon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0BEC5"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>
    <filter id="harpGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#harpGlow)">
    <!-- Reservoir dorsal -->
    <rect x="34" y="18" width="6" height="16" rx="3" fill="#78909C" stroke="#455A64" stroke-width="0.5"/>
    <!-- Tuyaux du reservoir au bras -->
    <path d="M37 20 Q42 18 44 22" fill="none" stroke="#90A4AE" stroke-width="1" opacity="0.7"/>
    <path d="M37 26 Q44 26 44 30" fill="none" stroke="#90A4AE" stroke-width="1" opacity="0.7"/>
    <!-- Corps imposant du haut -->
    <ellipse cx="30" cy="28" rx="9" ry="12" fill="url(#harpSuit)" stroke="#2E1B0E" stroke-width="0.6"/>
    <!-- Epaules renforcees -->
    <ellipse cx="22" cy="22" rx="4" ry="3" fill="#6D4C41" stroke="#3E2723" stroke-width="0.5"/>
    <ellipse cx="38" cy="22" rx="4" ry="3" fill="#6D4C41" stroke="#3E2723" stroke-width="0.5"/>
    <!-- Tete avec casque ouvert -->
    <circle cx="30" cy="13" r="5.5" fill="#6D4C41" stroke="#3E2723" stroke-width="0.6"/>
    <!-- Visage -->
    <circle cx="30" cy="14" r="3.5" fill="#BCAAA4"/>
    <!-- Viseur optique rouge -->
    <ellipse cx="28" cy="13" rx="2" ry="1" fill="#B71C1C" opacity="0.9"/>
    <ellipse cx="28" cy="13" rx="1.2" ry="0.6" fill="#FF1744" opacity="0.7"/>
    <!-- Bras mecanise gauche avec lance-harpon -->
    <line x1="22" y1="24" x2="14" y2="34" stroke="#78909C" stroke-width="3" stroke-linecap="round"/>
    <!-- Lance-harpon -->
    <rect x="10" y="28" width="3" height="12" rx="1" fill="url(#harpWeapon)" stroke="#455A64" stroke-width="0.4"/>
    <polygon points="11.5,26 9,29 14,29" fill="#B0BEC5" stroke="#455A64" stroke-width="0.3"/>
    <!-- Bras droit -->
    <line x1="38" y1="24" x2="44" y2="34" stroke="url(#harpSuit)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Jambes -->
    <line x1="27" y1="38" x2="24" y2="50" stroke="url(#harpSuit)" stroke-width="3" stroke-linecap="round"/>
    <line x1="33" y1="38" x2="36" y2="50" stroke="url(#harpSuit)" stroke-width="3" stroke-linecap="round"/>
    <!-- Harpons de rechange sur la cuisse -->
    <line x1="37" y1="42" x2="38" y2="49" stroke="#B0BEC5" stroke-width="0.8"/>
    <line x1="39" y1="42" x2="40" y2="49" stroke="#B0BEC5" stroke-width="0.8"/>
    <line x1="41" y1="43" x2="42" y2="49" stroke="#B0BEC5" stroke-width="0.8"/>
    <!-- Bottes -->
    <ellipse cx="24" cy="52" rx="3.5" ry="2" fill="#4E342E" stroke="#3E2723" stroke-width="0.4"/>
    <ellipse cx="36" cy="52" rx="3.5" ry="2" fill="#4E342E" stroke="#3E2723" stroke-width="0.4"/>
  </g>
</svg>
