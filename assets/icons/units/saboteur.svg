<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="saboteurSuit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="40%" stop-color="#37474F"/>
      <stop offset="70%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="saboteurCamo1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="50%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="saboteurCamo2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="50%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <radialGradient id="saboteurGoggles" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#B9F6CA"/>
      <stop offset="40%" stop-color="#69F0AE"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </radialGradient>
    <radialGradient id="saboteurGoggleGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#69F0AE" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#69F0AE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="saboteurPouch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <filter id="saboteurGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#saboteurGlow)">
    <!-- Ground shadow -->
    <ellipse cx="32" cy="56" rx="18" ry="2.5" fill="#1B5E20" opacity="0.2"/>
    <!-- Left leg - crouched, bent at knee close to ground -->
    <path d="M24,40 L20,46 L18,50 L20,52 L23,50 L25,46 L27,42 Z" fill="url(#saboteurSuit)" stroke="#1B5E20" stroke-width="0.4"/>
    <!-- Left leg camo patch -->
    <path d="M21,46 L19,49 L21,50 L23,48 Z" fill="url(#saboteurCamo2)" opacity="0.5"/>
    <!-- Left knee pad -->
    <ellipse cx="20.5" cy="47" rx="2" ry="1.3" fill="#37474F" stroke="#4CAF50" stroke-width="0.3"/>
    <!-- Left boot -->
    <path d="M18,50 L15,53 L19,54 L22,52 L20,52 Z" fill="#263238" stroke="#1B5E20" stroke-width="0.4"/>
    <!-- Left boot trim -->
    <line x1="16" y1="53.5" x2="20" y2="53.5" stroke="#4CAF50" stroke-width="0.3" opacity="0.5"/>
    <!-- Right leg - crouched, extended back -->
    <path d="M34,40 L38,45 L42,50 L44,52 L42,53 L38,50 L35,46 L33,42 Z" fill="url(#saboteurSuit)" stroke="#1B5E20" stroke-width="0.4"/>
    <!-- Right leg camo patch -->
    <path d="M38,46 L41,49 L42,51 L40,50 Z" fill="url(#saboteurCamo1)" opacity="0.5"/>
    <!-- Right knee pad -->
    <ellipse cx="40" cy="48" rx="1.8" ry="1.2" fill="#37474F" stroke="#4CAF50" stroke-width="0.3"/>
    <!-- Right boot -->
    <path d="M44,52 L47,54 L44,55 L42,53 Z" fill="#263238" stroke="#1B5E20" stroke-width="0.4"/>
    <!-- Right boot trim -->
    <line x1="43" y1="54.5" x2="46" y2="54.5" stroke="#4CAF50" stroke-width="0.3" opacity="0.5"/>
    <!-- Torso - crouched low, leaning forward -->
    <path d="M22,28 L34,26 L38,30 L40,40 L36,42 L26,42 L22,40 L20,32 Z" fill="url(#saboteurSuit)" stroke="#1B5E20" stroke-width="0.5"/>
    <!-- Torso camo zones - grey rock -->
    <path d="M25,30 L30,29 L31,33 L26,34 Z" fill="#455A64" opacity="0.5"/>
    <!-- Torso camo zones - deep blue -->
    <path d="M32,31 L37,32 L36,36 L31,35 Z" fill="#0D47A1" opacity="0.35"/>
    <!-- Torso camo zones - algae green -->
    <path d="M24,36 L29,35 L30,39 L25,40 Z" fill="#1B5E20" opacity="0.5"/>
    <!-- Suit seam lines -->
    <line x1="28" y1="27" x2="30" y2="42" stroke="#4CAF50" stroke-width="0.3" opacity="0.3"/>
    <line x1="34" y1="28" x2="35" y2="42" stroke="#4CAF50" stroke-width="0.3" opacity="0.3"/>
    <!-- Ventral pouch -->
    <rect x="26" y="35" width="10" height="5" rx="1.5" ry="1.5" fill="url(#saboteurPouch)" stroke="#4CAF50" stroke-width="0.4"/>
    <!-- EMP micro-charges in pouch -->
    <circle cx="28.5" cy="37" r="0.8" fill="#69F0AE" opacity="0.7"/>
    <circle cx="31" cy="37" r="0.8" fill="#69F0AE" opacity="0.7"/>
    <circle cx="33.5" cy="37" r="0.8" fill="#69F0AE" opacity="0.7"/>
    <rect x="27.5" y="38.5" width="2" height="1" rx="0.3" fill="#4CAF50" opacity="0.6"/>
    <rect x="30.5" y="38.5" width="2" height="1" rx="0.3" fill="#4CAF50" opacity="0.6"/>
    <rect x="33" y="38.5" width="2" height="1" rx="0.3" fill="#4CAF50" opacity="0.6"/>
    <!-- Pouch flap detail -->
    <line x1="26.5" y1="36" x2="35.5" y2="36" stroke="#4CAF50" stroke-width="0.3" opacity="0.5"/>
    <!-- Belt with tool attachments -->
    <rect x="21" y="33" width="18" height="1.8" rx="0.5" fill="#263238" stroke="#1B5E20" stroke-width="0.4"/>
    <!-- Belt buckle -->
    <rect x="29" y="33.2" width="3" height="1.4" rx="0.3" fill="#4CAF50" opacity="0.6"/>
    <!-- Tool 1 - small wrench shape at belt left -->
    <rect x="22.5" y="33" width="0.8" height="3" rx="0.2" fill="#455A64" stroke="#69F0AE" stroke-width="0.2"/>
    <circle cx="22.9" cy="36.2" r="0.6" fill="none" stroke="#455A64" stroke-width="0.3"/>
    <!-- Tool 2 - small cylinder at belt right -->
    <rect x="37" y="33" width="1.2" height="2.8" rx="0.4" fill="#455A64" stroke="#69F0AE" stroke-width="0.2"/>
    <!-- Tool 3 - small EMP device at belt -->
    <rect x="24.5" y="33.2" width="1.5" height="2" rx="0.3" fill="#37474F" stroke="#4CAF50" stroke-width="0.2"/>
    <circle cx="25.3" cy="34.2" r="0.3" fill="#69F0AE" opacity="0.8"/>
    <!-- Left arm - reaching down to ground -->
    <path d="M22,29 L18,33 L14,40 L13,44 L15,45 L17,42 L20,36 L23,31 Z" fill="url(#saboteurSuit)" stroke="#1B5E20" stroke-width="0.4"/>
    <!-- Left arm camo patch -->
    <path d="M17,35 L15,39 L16,41 L19,37 Z" fill="url(#saboteurCamo2)" opacity="0.4"/>
    <!-- Left arm trim -->
    <line x1="19" y1="31" x2="15" y2="42" stroke="#4CAF50" stroke-width="0.3" opacity="0.4"/>
    <!-- Left hand touching ground -->
    <path d="M13,44 L11,46 L13,47 L16,46 L15,45 Z" fill="#263238" stroke="#1B5E20" stroke-width="0.3"/>
    <!-- Left hand fingers on ground -->
    <line x1="12" y1="46" x2="11.5" y2="47" stroke="#263238" stroke-width="0.4"/>
    <line x1="13.5" y1="46.5" x2="13" y2="47.5" stroke="#263238" stroke-width="0.4"/>
    <!-- Right arm - tucked close, near pouch -->
    <path d="M37,30 L40,33 L42,38 L41,40 L39,38 L38,34 L36,31 Z" fill="url(#saboteurSuit)" stroke="#1B5E20" stroke-width="0.4"/>
    <!-- Right arm camo patch -->
    <path d="M39,34 L41,37 L40,39 L38,36 Z" fill="url(#saboteurCamo1)" opacity="0.4"/>
    <!-- Right arm trim -->
    <line x1="39" y1="32" x2="41" y2="38" stroke="#4CAF50" stroke-width="0.3" opacity="0.4"/>
    <!-- Right hand near pouch -->
    <ellipse cx="41" cy="40" rx="1.5" ry="1" fill="#263238" stroke="#1B5E20" stroke-width="0.3"/>
    <!-- Head - low crouched, looking forward -->
    <ellipse cx="30" cy="22" rx="6" ry="5.5" fill="url(#saboteurSuit)" stroke="#1B5E20" stroke-width="0.5"/>
    <!-- Hood / head cover -->
    <path d="M24,20 Q26,15 30,14 Q34,15 36,20 L35,23 Q30,24 25,23 Z" fill="#263238" stroke="#1B5E20" stroke-width="0.3"/>
    <!-- Hood camo detail -->
    <path d="M26,17 Q29,15.5 32,17 L31,19 Q29,18 27,19 Z" fill="#37474F" opacity="0.5"/>
    <!-- Face mask lower -->
    <path d="M25,23 Q30,26 35,23 L34,26 Q30,28 26,26 Z" fill="#263238" stroke="#1B5E20" stroke-width="0.3"/>
    <!-- Thermal goggles glow aura -->
    <ellipse cx="27.5" cy="21" rx="5" ry="3.5" fill="url(#saboteurGoggleGlow)" opacity="0.5"/>
    <ellipse cx="33" cy="21" rx="5" ry="3.5" fill="url(#saboteurGoggleGlow)" opacity="0.5"/>
    <!-- Thermal goggles - left lens -->
    <ellipse cx="27" cy="21" rx="3.2" ry="2.5" fill="url(#saboteurGoggles)" stroke="#4CAF50" stroke-width="0.5"/>
    <!-- Left lens inner highlight -->
    <ellipse cx="26.5" cy="20.2" rx="1.5" ry="1" fill="#B9F6CA" opacity="0.5"/>
    <!-- Left lens reflection dot -->
    <circle cx="25.8" cy="19.8" r="0.5" fill="#FFFFFF" opacity="0.6"/>
    <!-- Thermal goggles - right lens -->
    <ellipse cx="33.5" cy="21" rx="3.2" ry="2.5" fill="url(#saboteurGoggles)" stroke="#4CAF50" stroke-width="0.5"/>
    <!-- Right lens inner highlight -->
    <ellipse cx="33" cy="20.2" rx="1.5" ry="1" fill="#B9F6CA" opacity="0.5"/>
    <!-- Right lens reflection dot -->
    <circle cx="32.3" cy="19.8" r="0.5" fill="#FFFFFF" opacity="0.6"/>
    <!-- Goggles bridge -->
    <rect x="29.5" y="20" width="1.5" height="1.5" rx="0.3" fill="#37474F" stroke="#4CAF50" stroke-width="0.3"/>
    <!-- Goggles strap -->
    <path d="M24,20 Q22,19 22,21 Q22,23 24,22" fill="none" stroke="#37474F" stroke-width="0.6"/>
    <path d="M36.5,20 Q38.5,19 38.5,21 Q38.5,23 36.5,22" fill="none" stroke="#37474F" stroke-width="0.6"/>
    <!-- Robotic crustacean 1 - near left hand on ground -->
    <g>
      <!-- Crab body -->
      <ellipse cx="10" cy="49" rx="2.5" ry="1.5" fill="#37474F" stroke="#4CAF50" stroke-width="0.3"/>
      <!-- Crab shell detail -->
      <ellipse cx="10" cy="48.5" rx="1.8" ry="0.8" fill="#455A64" opacity="0.6"/>
      <!-- Crab eye stalks -->
      <line x1="8.5" y1="48" x2="7.5" y2="47" stroke="#37474F" stroke-width="0.4"/>
      <circle cx="7.5" cy="46.8" r="0.4" fill="#69F0AE" opacity="0.9"/>
      <line x1="11.5" y1="48" x2="12.5" y2="47" stroke="#37474F" stroke-width="0.4"/>
      <circle cx="12.5" cy="46.8" r="0.4" fill="#69F0AE" opacity="0.9"/>
      <!-- Crab legs left -->
      <line x1="8" y1="49" x2="6" y2="50.5" stroke="#455A64" stroke-width="0.4"/>
      <line x1="7.5" y1="49.5" x2="5.5" y2="51.5" stroke="#455A64" stroke-width="0.3"/>
      <line x1="8" y1="50" x2="6.5" y2="52" stroke="#455A64" stroke-width="0.3"/>
      <!-- Crab legs right -->
      <line x1="12" y1="49" x2="14" y2="50.5" stroke="#455A64" stroke-width="0.4"/>
      <line x1="12.5" y1="49.5" x2="14.5" y2="51.5" stroke="#455A64" stroke-width="0.3"/>
      <line x1="12" y1="50" x2="13.5" y2="52" stroke="#455A64" stroke-width="0.3"/>
      <!-- Crab claws -->
      <path d="M7.5,48.5 L6,47.5 L5.5,48.5 L6.5,49" fill="none" stroke="#455A64" stroke-width="0.4"/>
      <path d="M12.5,48.5 L14,47.5 L14.5,48.5 L13.5,49" fill="none" stroke="#455A64" stroke-width="0.4"/>
      <!-- Crab antenna LED -->
      <circle cx="10" cy="48" r="0.3" fill="#69F0AE" opacity="0.8"/>
    </g>
    <!-- Robotic crustacean 2 - smaller, near right boot -->
    <g>
      <!-- Small crab body -->
      <ellipse cx="48" cy="52" rx="1.8" ry="1" fill="#37474F" stroke="#4CAF50" stroke-width="0.3"/>
      <!-- Small crab shell -->
      <ellipse cx="48" cy="51.5" rx="1.2" ry="0.5" fill="#455A64" opacity="0.6"/>
      <!-- Small crab eyes -->
      <circle cx="46.8" cy="51" r="0.3" fill="#69F0AE" opacity="0.9"/>
      <circle cx="49.2" cy="51" r="0.3" fill="#69F0AE" opacity="0.9"/>
      <!-- Small crab legs -->
      <line x1="46.5" y1="52" x2="45" y2="53" stroke="#455A64" stroke-width="0.3"/>
      <line x1="46.2" y1="52.5" x2="45" y2="54" stroke="#455A64" stroke-width="0.3"/>
      <line x1="49.5" y1="52" x2="51" y2="53" stroke="#455A64" stroke-width="0.3"/>
      <line x1="49.8" y1="52.5" x2="51" y2="54" stroke="#455A64" stroke-width="0.3"/>
    </g>
    <!-- Goggle light reflection on ground -->
    <ellipse cx="20" cy="48" rx="4" ry="1.5" fill="#69F0AE" opacity="0.08"/>
    <!-- Ambient green particles near figure -->
    <circle cx="16" cy="38" r="0.4" fill="#69F0AE" opacity="0.3"/>
    <circle cx="43" cy="44" r="0.3" fill="#69F0AE" opacity="0.25"/>
    <circle cx="8" cy="42" r="0.35" fill="#4CAF50" opacity="0.2"/>
    <circle cx="50" cy="48" r="0.3" fill="#4CAF50" opacity="0.2"/>
  </g>
</svg>
