<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="saboSuit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E4053"/>
      <stop offset="100%" stop-color="#1B2631"/>
    </linearGradient>
    <linearGradient id="camoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A5276"/>
      <stop offset="30%" stop-color="#566573"/>
      <stop offset="60%" stop-color="#1E8449"/>
      <stop offset="100%" stop-color="#2E4053"/>
    </linearGradient>
    <filter id="saboGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#saboGlow)">
    <!-- Corps petit et ramasse, posture basse -->
    <ellipse cx="32" cy="36" rx="8" ry="10" fill="url(#camoGrad)" stroke="#1B2631" stroke-width="0.5"/>
    <!-- Sacoche ventrale -->
    <rect x="27" y="38" width="10" height="5" rx="2" fill="#34495E" stroke="#2C3E50" stroke-width="0.4"/>
    <!-- Micro-charges EMP dans la sacoche -->
    <circle cx="30" cy="40" r="1" fill="#E74C3C" opacity="0.6"/>
    <circle cx="34" cy="40" r="1" fill="#E74C3C" opacity="0.6"/>
    <!-- Tete avec lunettes thermiques -->
    <circle cx="32" cy="24" r="5" fill="url(#saboSuit)" stroke="#1B2631" stroke-width="0.5"/>
    <!-- Lunettes thermiques vertes -->
    <ellipse cx="29" cy="24" rx="3" ry="2" fill="#145A32" stroke="#0B5345" stroke-width="0.4"/>
    <ellipse cx="29" cy="24" rx="2" ry="1.2" fill="#2ECC71" opacity="0.7"/>
    <ellipse cx="35" cy="24" rx="3" ry="2" fill="#145A32" stroke="#0B5345" stroke-width="0.4"/>
    <ellipse cx="35" cy="24" rx="2" ry="1.2" fill="#2ECC71" opacity="0.7"/>
    <!-- Pont des lunettes -->
    <line x1="31" y1="24" x2="33" y2="24" stroke="#0B5345" stroke-width="0.8"/>
    <!-- Bras bas et rasants -->
    <line x1="24" y1="32" x2="18" y2="40" stroke="url(#camoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="32" x2="46" y2="40" stroke="url(#camoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Main gauche - outil de sabotage -->
    <rect x="15" y="40" width="5" height="2" rx="0.5" fill="#7F8C8D" stroke="#566573" stroke-width="0.3"/>
    <!-- Main droite - parasite mecanique (crustace robot) -->
    <ellipse cx="48" cy="41" rx="3" ry="2" fill="#566573" stroke="#2C3E50" stroke-width="0.4"/>
    <line x1="46" y1="39" x2="44" y2="38" stroke="#7F8C8D" stroke-width="0.5"/>
    <line x1="50" y1="39" x2="52" y2="38" stroke="#7F8C8D" stroke-width="0.5"/>
    <line x1="46" y1="43" x2="44" y2="44" stroke="#7F8C8D" stroke-width="0.5"/>
    <line x1="50" y1="43" x2="52" y2="44" stroke="#7F8C8D" stroke-width="0.5"/>
    <!-- Jambes courtes, posture rasante -->
    <line x1="29" y1="44" x2="26" y2="52" stroke="url(#camoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="44" x2="38" y2="52" stroke="url(#camoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Pieds rasants -->
    <ellipse cx="26" cy="53" rx="3" ry="1.5" fill="#2E4053" stroke="#1B2631" stroke-width="0.3"/>
    <ellipse cx="38" cy="53" rx="3" ry="1.5" fill="#2E4053" stroke="#1B2631" stroke-width="0.3"/>
    <!-- Petits crustaces robotiques autour -->
    <ellipse cx="14" cy="50" rx="2" ry="1.2" fill="#566573" opacity="0.5"/>
    <line x1="12" y1="49" x2="11" y2="48" stroke="#7F8C8D" stroke-width="0.4" opacity="0.5"/>
    <line x1="16" y1="49" x2="17" y2="48" stroke="#7F8C8D" stroke-width="0.4" opacity="0.5"/>
    <ellipse cx="52" cy="48" rx="1.8" ry="1" fill="#566573" opacity="0.4"/>
  </g>
</svg>
