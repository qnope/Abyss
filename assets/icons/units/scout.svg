<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="scoutSuit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <radialGradient id="visorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#64FFDA"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </radialGradient>
    <filter id="scoutGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#scoutGlow)">
    <!-- Propulseur dorsal -->
    <rect x="28" y="20" width="8" height="14" rx="2" fill="#455A64" stroke="#263238" stroke-width="0.5"/>
    <ellipse cx="32" cy="35" rx="3" ry="1.5" fill="#00B8D4" opacity="0.5"/>
    <!-- Corps - silhouette fine -->
    <ellipse cx="32" cy="30" rx="6" ry="12" fill="url(#scoutSuit)" stroke="#263238" stroke-width="0.6"/>
    <!-- Tete avec masque integral -->
    <circle cx="32" cy="16" r="6" fill="url(#scoutSuit)" stroke="#263238" stroke-width="0.6"/>
    <!-- Visiere luminescente bleue -->
    <ellipse cx="32" cy="16" rx="5" ry="2.5" fill="url(#visorGlow)" opacity="0.9"/>
    <ellipse cx="32" cy="16" rx="3.5" ry="1.5" fill="#64FFDA" opacity="0.4"/>
    <!-- Bras fins -->
    <line x1="26" y1="24" x2="20" y2="32" stroke="url(#scoutSuit)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="38" y1="24" x2="44" y2="32" stroke="url(#scoutSuit)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Jambes fines -->
    <line x1="29" y1="40" x2="26" y2="52" stroke="url(#scoutSuit)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="40" x2="38" y2="52" stroke="url(#scoutSuit)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Bottes legeres -->
    <ellipse cx="26" cy="53" rx="3" ry="1.5" fill="#37474F" stroke="#263238" stroke-width="0.4"/>
    <ellipse cx="38" cy="53" rx="3" ry="1.5" fill="#37474F" stroke="#263238" stroke-width="0.4"/>
    <!-- Balises lumineuses a la ceinture -->
    <circle cx="27" cy="34" r="1" fill="#64FFDA" opacity="0.8"/>
    <circle cx="32" cy="35" r="1" fill="#64FFDA" opacity="0.8"/>
    <circle cx="37" cy="34" r="1" fill="#64FFDA" opacity="0.8"/>
    <!-- Effet sonar depuis la visiere -->
    <ellipse cx="32" cy="16" rx="10" ry="4" fill="none" stroke="#64FFDA" stroke-width="0.3" opacity="0.3"/>
    <ellipse cx="32" cy="16" rx="14" ry="6" fill="none" stroke="#64FFDA" stroke-width="0.2" opacity="0.2"/>
  </g>
</svg>
